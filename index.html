<!DOCTYPE html>
<html>
<head>
<title>Room Rental System PRO MAX</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.dashboard { display:flex; gap:10px; }

.card {
  flex:1;
  padding:15px;
  background:#3498db;
  color:white;
  border-radius:10px;
  text-align:center;
}

input, select { padding:8px; margin:5px; }

button {
  padding:8px 12px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.deleteBtn { background:red; }
.editBtn { background:orange; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }
</style>
</head>

<body>

<h2>🏨 Room Rental System PRO MAX</h2>

<!-- TAB -->
<div>
<button onclick="showTab('records')">Records</button>
<button onclick="showTab('ledger')">Ledger</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card">Rooms<br><span id="totalRooms">0</span></div>
  <div class="card">Occupied<br><span id="occupiedRooms">0</span></div>
  <div class="card">Available<br><span id="availableRooms">0</span></div>
  <div class="card">Income<br><span id="totalIncome">0</span></div>
</div>

<!-- RECORDS -->
<div id="recordsTab">

<div class="box">
<h3>Add Room</h3>
<input id="roomNumber" placeholder="Room #">
<input id="roomPrice" type="number" placeholder="Price per head">
<input id="roomCapacity" type="number" placeholder="Capacity">
<button onclick="addRoom()">Add Room</button>
</div>

<div class="box">
<h3>Add Tenant</h3>
<input id="tenantName" placeholder="Tenant Name">
<select id="category">
<option>Tenant</option>
<option>Bed Space</option>
<option>Freelancer</option>
<option>Staff</option>
</select>
<select id="roomSelect"></select>
<button onclick="addTenant()">Save Tenant</button>
</div>

<div class="box">
<h3>Tenant List</h3>
<table>
<thead>
<tr><th>#</th><th>Name</th><th>Room</th><th>Category</th><th>Action</th></tr>
</thead>
<tbody id="tenantList"></tbody>
</table>
</div>

<div class="box">
<h3>Monthly Billing</h3>
<select id="tenantSelect"></select>
<input type="month" id="month">
<input type="number" id="payment" placeholder="Payment">
<button onclick="addBilling()">Save</button>
<button onclick="autoNextMonth()">Auto Next Month</button>
</div>

<div class="box">
<h3>Records</h3>
<table>
<thead>
<tr>
<th>#</th><th>Name</th><th>Room</th><th>Category</th>
<th>Month</th><th>Rental</th><th>Payment</th><th>Balance</th><th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<!-- LEDGER -->
<div id="ledgerTab" style="display:none;" class="box">

<h3>Yearly Ledger</h3>

<select id="yearFilter"></select>

<table>
<thead>
<tr>
<th>Name</th>
<th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th>
<th>May</th><th>Jun</th><th>Jul</th><th>Aug</th>
<th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
<th>Total</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>
</table>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
let billings = JSON.parse(localStorage.getItem("billings")) || [];

// SAVE
function save(){
localStorage.setItem("rooms",JSON.stringify(rooms));
localStorage.setItem("tenants",JSON.stringify(tenants));
localStorage.setItem("billings",JSON.stringify(billings));
}

// TAB
function showTab(tab){
recordsTab.style.display = tab=="records"?"block":"none";
ledgerTab.style.display = tab=="ledger"?"block":"none";
}

// DASHBOARD
function loadDashboard(){
totalRooms.innerText = rooms.length;
occupiedRooms.innerText = tenants.length;

let capacity = rooms.reduce((s,r)=>s+r.capacity,0);
availableRooms.innerText = capacity - tenants.length;

let income = billings.reduce((s,b)=>s+b.payment,0);
totalIncome.innerText = income;
}

// ROOM
function addRoom(){
rooms.push({
number:roomNumber.value,
price:Number(roomPrice.value),
capacity:Number(roomCapacity.value),
occupied:0
});
save();
loadAll();
}

// LOAD ROOMS
function loadRooms(){
roomSelect.innerHTML="";
rooms.forEach((r,i)=>{
if(r.occupied<r.capacity){
roomSelect.innerHTML+=`<option value="${i}">
${r.number} (${r.occupied}/${r.capacity})
</option>`;
}
});
}

// TENANT
function addTenant(){
let r = rooms[roomSelect.value];
if(r.occupied>=r.capacity) return alert("Full");

tenants.push({
name:tenantName.value,
category:category.value,
room:r.number,
rent:r.price
});

r.occupied++;
save();
loadAll();
}

// TENANT LIST
function loadTenantList(){
tenantList.innerHTML="";
tenants.forEach((t,i)=>{
tenantList.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.room}</td>
<td>${t.category}</td>
<td><button class="deleteBtn" onclick="deleteTenant(${i})">Delete</button></td>
</tr>`;
});
}

// DELETE TENANT
function deleteTenant(i){
let t = tenants[i];
let r = rooms.find(x=>x.number==t.room);
if(r) r.occupied--;

billings = billings.filter(b=>b.name!=t.name);
tenants.splice(i,1);

save();
loadAll();
}

// TENANT SELECT
function loadTenants(){
tenantSelect.innerHTML="";
tenants.forEach((t,i)=>{
tenantSelect.innerHTML+=`<option value="${i}">
${t.name} (${t.room})
</option>`;
});
}

// BILLING
function addBilling(){
let t = tenants[tenantSelect.value];
let pay = Number(payment.value)||0;
let rental = t.rent;

billings.push({
name:t.name,
room:t.room,
category:t.category,
month:month.value,
rental,
payment:pay,
balance:rental-pay
});

save();
loadAll();
}

// AUTO NEXT
function autoNextMonth(){
let last = billings[billings.length-1];
if(!last) return;

let d = new Date(last.month);
d.setMonth(d.getMonth()+1);

billings.push({
...last,
month:d.toISOString().slice(0,7),
payment:0,
balance:last.rental
});

save();
loadAll();
}

// TABLE
function formatMonth(m){
return new Date(m).toLocaleString('default',{month:'short',year:'numeric'});
}

function loadTable(){
table.innerHTML="";
billings.forEach((b,i)=>{
table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.category}</td>
<td>${formatMonth(b.month)}</td>
<td>${b.rental}</td>
<td>${b.payment}</td>
<td style="color:${b.balance>0?'red':'green'}">${b.balance}</td>
<td><button onclick="deleteBilling(${i})">Delete</button></td>
</tr>`;
});
}

function deleteBilling(i){
billings.splice(i,1);
save();
loadAll();
}

// YEAR FILTER
function loadYearFilter(){
yearFilter.innerHTML="";
let y = new Date().getFullYear();
for(let i=y;i>=2020;i--){
yearFilter.innerHTML+=`<option>${i}</option>`;
}
}

yearFilter.onchange = loadLedger;

// LEDGER
function loadLedger(){
let year = yearFilter.value;
ledgerTable.innerHTML="";

tenants.forEach(t=>{
let months = Array(12).fill(0);

billings.forEach(b=>{
let d = new Date(b.month);
if(b.name==t.name && d.getFullYear()==year){
months[d.getMonth()] += b.balance;
}
});

let total = months.reduce((a,b)=>a+b,0);

ledgerTable.innerHTML+=`
<tr>
<td>${t.name}</td>
${months.map(m=>`<td>${m}</td>`).join("")}
<td style="color:${total>0?'red':'green'}">${total}</td>
</tr>`;
});
}

// LOAD ALL
function loadAll(){
loadRooms();
loadTenants();
loadTenantList();
loadTable();
loadDashboard();
loadYearFilter();
loadLedger();
}

// INIT
loadAll();

</script>

</body>
</html>
