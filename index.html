<!DOCTYPE html>
<html>
<head>
<title>Accommodation System</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  padding:8px;
  margin:5px;
}

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

.saveBtn { background:green; }
.updateBtn { background:orange; }
.deleteBtn { background:red; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }
</style>

</head>

<body>

<h2>🏨 Accommodation System</h2>

<!-- FORM -->
<div class="box">

<h3>Tenant Form</h3>

<input id="name" placeholder="Tenant Name">
<input id="room" placeholder="Room Number">

<select id="category">
<option>Tenant</option>
<option>Bed Space</option>
<option>Freelancer</option>
<option>Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>

<input type="month" id="month" min="2000-01">

<input type="number" id="rent" placeholder="Rent Amount">
<input type="number" id="payment" placeholder="Payment">
<input type="number" id="price" placeholder="Price per head">
<input type="number" id="capacity" placeholder="Capacity">

<br>

<button class="saveBtn" onclick="saveData()">Save</button>
<button class="updateBtn" onclick="updateData()">Update</button>
<button class="deleteBtn" onclick="deleteData()">Delete</button>

</div>

<!-- TABLE -->
<div class="box">

<h3>Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Month</th>
<th>Rent</th>
<th>Payment</th>
<th>Balance</th>
<th>Price</th>
<th>Capacity</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

// 🔥 FIXED INPUT REFERENCES
const nameInput = document.getElementById("name");
const roomInput = document.getElementById("room");
const categoryInput = document.getElementById("category");
const monthInput = document.getElementById("month");
const rentInput = document.getElementById("rent");
const paymentInput = document.getElementById("payment");
const priceInput = document.getElementById("price");
const capacityInput = document.getElementById("capacity");

let data = JSON.parse(localStorage.getItem("data")) || [];
let editIndex = -1;

// SAVE
function saveData(){

if(!nameInput.value.trim()) return alert("Enter tenant name");

let rentVal = Number(rentInput.value) || 0;
let paymentVal = Number(paymentInput.value) || 0;

let record = {
name: nameInput.value,
room: roomInput.value,
category: categoryInput.value,
month: monthInput.value,
rent: rentVal,
payment: paymentVal,
balance: rentVal - paymentVal,
price: Number(priceInput.value) || 0,
capacity: Number(capacityInput.value) || 0
};

data.push(record);

save();
loadTable();
clearForm();
}

// UPDATE
function updateData(){

if(editIndex === -1) return alert("Select record first");

let rentVal = Number(rentInput.value) || 0;
let paymentVal = Number(paymentInput.value) || 0;

data[editIndex] = {
name: nameInput.value,
room: roomInput.value,
category: categoryInput.value,
month: monthInput.value,
rent: rentVal,
payment: paymentVal,
balance: rentVal - paymentVal,
price: Number(priceInput.value) || 0,
capacity: Number(capacityInput.value) || 0
};

editIndex = -1;

save();
loadTable();
clearForm();
}

// DELETE (FORM)
function deleteData(){

if(editIndex === -1) return alert("Select record first");

data.splice(editIndex,1);

editIndex = -1;

save();
loadTable();
clearForm();
}

// EDIT FROM TABLE
function editRow(i){

let d = data[i];

nameInput.value = d.name || "";
roomInput.value = d.room || "";
categoryInput.value = d.category || "Tenant";
monthInput.value = d.month || "";
rentInput.value = d.rent || 0;
paymentInput.value = d.payment || 0;
priceInput.value = d.price || 0;
capacityInput.value = d.capacity || 0;

editIndex = i;
}

// DELETE FROM TABLE
function deleteRow(i){

if(confirm("Delete record?")){
data.splice(i,1);
save();
loadTable();
}
}

// LOAD TABLE
function loadTable(){

table.innerHTML = "";

data.forEach((d,i)=>{

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${d.name || ""}</td>
<td>${d.room || ""}</td>
<td>${d.category || ""}</td>
<td>${d.month || ""}</td>
<td>${d.rent || 0}</td>
<td>${d.payment || 0}</td>
<td style="color:${d.balance>0?'red':'green'}">${d.balance}</td>
<td>${d.price || 0}</td>
<td>${d.capacity || 0}</td>
<td>
<button onclick="editRow(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteRow(${i})">Delete</button>
</td>
</tr>
`;

});
}

// SAVE STORAGE
function save(){
localStorage.setItem("data", JSON.stringify(data));
}

// CLEAR FORM
function clearForm(){
nameInput.value = "";
roomInput.value = "";
categoryInput.value = "Tenant";
monthInput.value = "";
rentInput.value = "";
paymentInput.value = "";
priceInput.value = "";
capacityInput.value = "";
editIndex = -1;
}

// INIT
loadTable();

</script>

</body>
</html>
