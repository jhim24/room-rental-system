<!DOCTYPE html>
<html>
<head>
<title>Room Rental System PRO+</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  padding:8px;
  margin:5px;
}

button {
  padding:8px 12px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:5px;
}

.payBtn { background:green; }
.deleteBtn { background:red; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }
</style>
</head>

<body>

<h2>🏨 Room Rental System (Ledger Style)</h2>

<div class="box">
<h3>Add Room</h3>
<input type="text" id="roomNumber" placeholder="Room #">
<input type="number" id="roomPrice" placeholder="Rent">
<button onclick="addRoom()">Add</button>
</div>

<div class="box">
<h3>Add Tenant</h3>
<input type="text" id="tenantName" placeholder="Name">
<select id="category">
<option>Tenant</option>
<option>Bed Space</option>
<option>Freelancer</option>
<option>Staff</option>
</select>
<select id="roomSelect"></select>
<button onclick="addTenant()">Save Tenant</button>
</div>

<div class="box">
<h3>Add Monthly Billing</h3>
<select id="tenantSelect"></select>
<input type="month" id="month">
<input type="number" id="payment" placeholder="Payment">
<button onclick="addBilling()">Add Billing</button>
</div>

<div class="box">
<h3>Ledger Table</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Month</th>
<th>Rental</th>
<th>Payment</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
let billings = JSON.parse(localStorage.getItem("billings")) || [];

function save(){
  localStorage.setItem("rooms", JSON.stringify(rooms));
  localStorage.setItem("tenants", JSON.stringify(tenants));
  localStorage.setItem("billings", JSON.stringify(billings));
}

function addRoom(){
  rooms.push({ number:roomNumber.value, price:roomPrice.value, status:"Available" });
  save(); loadRooms();
}

function loadRooms(){
  roomSelect.innerHTML="";
  rooms.forEach((r,i)=>{
    if(r.status==="Available"){
      roomSelect.innerHTML += `<option value="${i}">${r.number}</option>`;
    }
  });
}

function addTenant(){
  let room = rooms[roomSelect.value];

  tenants.push({
    name:tenantName.value,
    category:category.value,
    room:room.number,
    rent:room.price
  });

  room.status="Occupied";

  save();
  loadTenants();
  loadRooms();
}

function loadTenants(){
  tenantSelect.innerHTML="";
  tenants.forEach((t,i)=>{
    tenantSelect.innerHTML += `<option value="${i}">${t.name} - Room ${t.room}</option>`;
  });
}

function formatMonth(m){
  let d = new Date(m);
  return d.toLocaleString('default',{month:'long', year:'numeric'});
}

function addBilling(){
  let t = tenants[tenantSelect.value];
  let pay = parseFloat(payment.value) || 0;
  let rental = parseFloat(t.rent);
  let balance = rental - pay;

  billings.push({
    name:t.name,
    room:t.room,
    category:t.category,
    month:month.value,
    rental,
    payment:pay,
    balance
  });

  save();
  loadTable();
}

function loadTable(){
  table.innerHTML="";

  billings.forEach((b,i)=>{
    let m = formatMonth(b.month);

    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${b.name}</td>
        <td>${b.room}</td>
        <td>${b.category}</td>
        <td>${m}</td>
        <td>${m} Rental: ${b.rental}</td>
        <td>${m} Payment: ${b.payment}</td>
        <td>${m} Balance: ${b.balance}</td>
      </tr>
    `;
  });
}

loadRooms();
loadTenants();
loadTable();

</script>

</body>
</html>
