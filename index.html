<!DOCTYPE html>
<html>
<head>
<title>Room Rental System</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }
h2 { color:#2c3e50; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select {
  padding:8px;
  margin:5px;
  width:200px;
}

button {
  padding:8px 15px;
  margin:5px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.payBtn { background:green; }
.deleteBtn { background:red; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th {
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<h2>🏨 Room Rental System PRO</h2>

<div class="box">
<h3>Add Room</h3>
<input type="text" id="roomNumber" placeholder="Room #">
<input type="number" id="roomPrice" placeholder="Monthly Rent">
<button onclick="addRoom()">Add Room</button>
</div>

<div class="box">
<h3>Add Tenant</h3>
<input type="text" id="tenantName" placeholder="Tenant Name">
<select id="category">
  <option>Tenant</option>
  <option>Bed Space</option>
  <option>Freelancer</option>
  <option>Staff</option>
</select>
<select id="roomSelect"></select>
<input type="number" id="payment" placeholder="Payment">
<button onclick="addTenant()">Save</button>
</div>

<div class="box">
<h3>Monthly Record (Jan 2026)</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Code</th>
<th>Category</th>
<th>Rental</th>
<th>Payment</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tenantTable"></tbody>
</table>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

function saveData(){
  localStorage.setItem("rooms", JSON.stringify(rooms));
  localStorage.setItem("tenants", JSON.stringify(tenants));
}

function generateCode(index){
  return "SYS-" + String(index+1).padStart(3,'0');
}

function addRoom(){
  if(!roomNumber.value || !roomPrice.value) return alert("Fill fields");

  rooms.push({
    number:roomNumber.value,
    price:roomPrice.value,
    status:"Available"
  });

  saveData();
  loadRooms();

  roomNumber.value="";
  roomPrice.value="";
}

function loadRooms(){
  roomSelect.innerHTML="";
  rooms.forEach((r,i)=>{
    if(r.status==="Available"){
      roomSelect.innerHTML += `<option value="${i}">${r.number}</option>`;
    }
  });
}

function addTenant(){
  let name = tenantName.value;
  let cat = category.value;
  let roomIndex = roomSelect.value;
  let pay = parseFloat(payment.value) || 0;

  if(!name) return alert("Enter name");

  let room = rooms[roomIndex];
  let rental = parseFloat(room.price);
  let balance = rental - pay;

  let newTenant = {
    name,
    category:cat,
    room:room.number,
    rental,
    payment:pay,
    balance
  };

  tenants.push(newTenant);
  rooms[roomIndex].status="Occupied";

  saveData();
  loadRooms();
  loadTenants();

  tenantName.value="";
  payment.value="";
}

function deleteTenant(index){
  let roomNum = tenants[index].room;

  let room = rooms.find(r=>r.number===roomNum);
  if(room) room.status="Available";

  tenants.splice(index,1);

  saveData();
  loadRooms();
  loadTenants();
}

function loadTenants(){
  tenantTable.innerHTML="";

  tenants.forEach((t,i)=>{
    let code = generateCode(i);

    tenantTable.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${t.name}</td>
        <td>${t.room}</td>
        <td>${code}</td>
        <td>${t.category}</td>
        <td>${t.rental}</td>
        <td>${t.payment}</td>
        <td>${t.balance}</td>
        <td>
          <button class="deleteBtn" onclick="deleteTenant(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

loadRooms();
loadTenants();

</script>

</body>
</html>
