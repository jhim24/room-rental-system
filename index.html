<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.menu button:hover { background:#3498db; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
}

.card {
  background: linear-gradient(135deg,#36d1dc,#5b86e5);
  color:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">

<button onclick="location.href='index.html?v=12'">
📊 Dashboard
</button>

<button onclick="location.href='rooms.html?v=12'">
🏠 Rooms
</button>

<button onclick="location.href='clients.html?v=12'">
👥 Clients
</button>

<button onclick="location.href='journal-voucher-entry.html?v=12'">
📒 Journal
</button>

<button onclick="location.href='coa.html?v=12'">
📚 Chart of Accounts
</button>

<button onclick="location.href='ledger.html?v=12'">
📘 Client Ledger
</button>

</div>
</div>

<div class="main">

<h2 style="color:white;">Dashboard</h2>

<div class="grid">
<div class="card">Rooms<br><b id="rooms">0</b></div>
<div class="card">Tenants<br><b id="tenants">0</b></div>
<div class="card">Available Rooms<br><b id="availableRooms">0</b></div>
<div class="card">Empty Slots<br><b id="emptySlots">0</b></div>
<div class="card">Bed Space<br><b id="bed">0</b></div>
<div class="card">Freelancer<br><b id="free">0</b></div>
<div class="card">Company Staff<br><b id="company">0</b></div>
</div>

</div>

<script>

let roomsData = JSON.parse(localStorage.getItem("rooms")) || [];
let tenantsData = JSON.parse(localStorage.getItem("tenants")) || [];

function loadDashboard(){

rooms.innerText = roomsData.length;
tenants.innerText = tenantsData.length;

let totalCap = roomsData.reduce((s,r)=>s+(r.capacity||0),0);
emptySlots.innerText = totalCap - tenantsData.length;

let availableRoomsCount = roomsData.filter(r=>{
let occ = tenantsData.filter(t=>t.room===r.number).length;
return occ < r.capacity;
}).length;

availableRooms.innerText = availableRoomsCount;

bed.innerText = tenantsData.filter(t=>t.category==="Bed Space").length;
free.innerText = tenantsData.filter(t=>t.category==="Freelancer").length;
company.innerText = tenantsData.filter(t=>t.category==="Company Staff").length;

}

loadDashboard();

</script>

</body>
</html>
