<!DOCTYPE html>
<html>
<head>
<title>Room Rental System PRO</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select { padding:8px; margin:5px; }

button {
  padding:8px 12px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.deleteBtn { background:red; }
.editBtn { background:orange; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }
</style>
</head>

<body>

<h2>🏨 Room Rental System PRO</h2>

<div class="box">
<h3>Add Room</h3>
<input type="text" id="roomNumber" placeholder="Room #">
<input type="number" id="roomPrice" placeholder="Monthly Rent">
<button onclick="addRoom()">Add Room</button>
</div>

<div class="box">
<h3>Add Tenant</h3>
<input type="text" id="tenantName" placeholder="Tenant Name">
<select id="category">
<option>Tenant</option>
<option>Bed Space</option>
<option>Freelancer</option>
<option>Staff</option>
</select>
<select id="roomSelect"></select>
<button onclick="addTenant()">Save Tenant</button>
</div>

<div class="box">
<h3>Monthly Billing</h3>
<select id="tenantSelect"></select>
<input type="month" id="month">
<input type="number" id="payment" placeholder="Payment">
<button onclick="addBilling()">Save / Update</button>
</div>

<div class="box">
<h3>Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Month</th>
<th>Rental</th>
<th>Payment</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
let billings = JSON.parse(localStorage.getItem("billings")) || [];
let editIndex = -1;

// SAVE
function save(){
  localStorage.setItem("rooms", JSON.stringify(rooms));
  localStorage.setItem("tenants", JSON.stringify(tenants));
  localStorage.setItem("billings", JSON.stringify(billings));
}

// ROOM
function addRoom(){
  if(!roomNumber.value || !roomPrice.value) return alert("Fill all");

  rooms.push({
    number:roomNumber.value,
    price:roomPrice.value,
    status:"Available"
  });

  save();
  loadRooms();

  roomNumber.value="";
  roomPrice.value="";
}

function loadRooms(){
  roomSelect.innerHTML="";
  rooms.forEach((r,i)=>{
    if(r.status==="Available"){
      roomSelect.innerHTML += `<option value="${i}">${r.number}</option>`;
    }
  });
}

// TENANT
function addTenant(){
  if(!tenantName.value) return alert("Enter name");

  let room = rooms[roomSelect.value];

  tenants.push({
    name:tenantName.value,
    category:category.value,
    room:room.number,
    rent:room.price
  });

  room.status="Occupied";

  save();
  loadTenants();
  loadRooms();

  tenantName.value="";
}

function loadTenants(){
  tenantSelect.innerHTML="";
  tenants.forEach((t,i)=>{
    tenantSelect.innerHTML += `<option value="${i}">${t.name} - Room ${t.room}</option>`;
  });
}

// FORMAT MONTH
function formatMonth(m){
  let d = new Date(m);
  return d.toLocaleString('default',{month:'long', year:'numeric'});
}

// BILLING
function addBilling(){
  let t = tenants[tenantSelect.value];
  let pay = parseFloat(payment.value) || 0;
  let rental = parseFloat(t.rent);
  let balance = rental - pay;

  if(!month.value) return alert("Select month");

  // 🚫 DUPLICATE CHECK
  let exist = billings.find((b,i)=>
    b.name===t.name && b.month===month.value && i!==editIndex
  );

  if(exist) return alert("Already has record for this month!");

  if(editIndex === -1){
    billings.push({
      name:t.name,
      room:t.room,
      category:t.category,
      month:month.value,
      rental,
      payment:pay,
      balance
    });
  } else {
    billings[editIndex] = {
      name:t.name,
      room:t.room,
      category:t.category,
      month:month.value,
      rental,
      payment:pay,
      balance
    };
    editIndex = -1;
  }

  save();
  loadTable();

  payment.value="";
}

// TABLE
function loadTable(){
  table.innerHTML="";

  billings.forEach((b,i)=>{
    let m = formatMonth(b.month);

    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${b.name}</td>
        <td>${b.room}</td>
        <td>${b.category}</td>
        <td>${m}</td>
        <td>${b.rental}</td>
        <td>${b.payment}</td>
        <td style="color:${b.balance>0?'red':'green'}">${b.balance}</td>
        <td>
          <button class="editBtn" onclick="editBilling(${i})">Edit</button>
          <button class="deleteBtn" onclick="deleteBilling(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// EDIT
function editBilling(index){
  let b = billings[index];

  tenantSelect.value = tenants.findIndex(t => t.name === b.name);
  month.value = b.month;
  payment.value = b.payment;

  editIndex = index;
}

// DELETE
function deleteBilling(index){
  if(confirm("Delete this record?")){
    billings.splice(index,1);
    save();
    loadTable();
  }
}

// INIT
loadRooms();
loadTenants();
loadTable();

</script>

</body>
</html>
