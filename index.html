<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.7);
  color:white;
  padding:20px;
}

.sidebar h2 {
  text-align:center;
}

.menu {
  margin-top:30px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  text-align:left;
}

.menu button:hover {
  background:#3498db;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* CARDS */
.flex {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.card {
  flex:1;
  min-width:150px;
  background: linear-gradient(135deg,#36d1dc,#5b86e5);
  color:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card b {
  font-size:24px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="go('index.html')">📊 Dashboard</button>
<button onclick="go('rooms.html')">🏠 Rooms</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h2>Dashboard</h2>

<div class="flex">
<div class="card">Rooms<br><b id="rooms">0</b></div>
<div class="card">Tenants<br><b id="tenants">0</b></div>
<div class="card">Available<br><b id="available">0</b></div>
</div>

</div>

<script>

// NAVIGATION
function go(page){
window.location.href = page;
}

// LOAD DATA
let roomsData = JSON.parse(localStorage.getItem("rooms")) || [];
let tenantsData = JSON.parse(localStorage.getItem("tenants")) || [];

// DASHBOARD
function loadDashboard(){

rooms.innerText = roomsData.length;
tenants.innerText = tenantsData.length;

// capacity logic
let totalCap = roomsData.reduce((sum,r)=>sum+(r.capacity||0),0);
available.innerText = totalCap - tenantsData.length;

}

loadDashboard();

</script>

</body>
</html>
