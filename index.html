<!DOCTYPE html>
<html>
<head>
<title>Accommodation System V3</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding:20px;
  color:#2c3e50;
}

/* CONTAINER */
.box {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* FLEX */
.flex {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* DASHBOARD CARD */
.card {
  flex:1;
  min-width:150px;
  background: linear-gradient(135deg,#3498db,#6dd5fa);
  color:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-size:18px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* INPUT */
input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  opacity:0.85;
  transform:scale(1.05);
}

.saveBtn { background:#2ecc71; }
.deleteBtn { background:#e74c3c; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

th {
  background:#3498db;
  color:white;
}

tr:nth-child(even){
  background:#f9f9f9;
}
</style>

</head>

<body>

<h2 style="color:white;">🏨 Accommodation System V3</h2>

<!-- DASHBOARD -->
<div class="box">
<h3>Dashboard</h3>

<div class="flex">
<div class="card">Rooms<br><b id="totalRooms">0</b></div>
<div class="card">Tenants<br><b id="totalTenants">0</b></div>
<div class="card">Available<br><b id="availableSlots">0</b></div>
</div>

</div>

<!-- ROOM -->
<div class="box">
<h3>Add Room</h3>
<input id="roomNo" placeholder="Room #">
<input id="capacity" type="number" placeholder="Capacity">
<button class="saveBtn" onclick="addRoom()">Add Room</button>
</div>

<!-- TENANT -->
<div class="box">
<h3>Add Tenant</h3>

<input id="tenantName" placeholder="Tenant Name">

<select id="roomSelect"></select>

<select id="category">
<option>Bed Space</option>
<option>Tenant</option>
<option>Freelancer</option>
<option>Company Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>

<button class="saveBtn" onclick="addTenant()">Save Tenant</button>

</div>

<!-- ROOM STATUS -->
<div class="box">
<h3>Room Status</h3>

<table>
<thead>
<tr>
<th>Room</th>
<th>Capacity</th>
<th>Occupied</th>
<th>Available</th>
</tr>
</thead>

<tbody id="roomTable"></tbody>
</table>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

// SAVE
function save(){
localStorage.setItem("rooms", JSON.stringify(rooms));
localStorage.setItem("tenants", JSON.stringify(tenants));
}

// ADD ROOM
function addRoom(){

if(!roomNo.value || !capacity.value) return alert("Fill all");

rooms.push({
number: roomNo.value,
capacity: Number(capacity.value)
});

save();
loadAll();

roomNo.value="";
capacity.value="";
}

// LOAD ROOMS
function loadRooms(){
roomSelect.innerHTML="";

rooms.forEach((r,i)=>{
roomSelect.innerHTML += `<option value="${i}">${r.number}</option>`;
});
}

// ADD TENANT
function addTenant(){

let r = rooms[roomSelect.value];

let occupied = tenants.filter(t=>t.room===r.number).length;

if(occupied >= r.capacity){
return alert("Room full");
}

tenants.push({
name: tenantName.value,
room: r.number,
category: category.value
});

save();
loadAll();

tenantName.value="";
}

// ROOM STATUS
function loadRoomStatus(){

roomTable.innerHTML="";

rooms.forEach(r=>{

let occupied = tenants.filter(t=>t.room===r.number).length;
let available = r.capacity - occupied;

roomTable.innerHTML += `
<tr>
<td>${r.number}</td>
<td>${r.capacity}</td>
<td>${occupied}</td>
<td style="color:${available>0?'green':'red'}">${available}</td>
</tr>
`;
});
}

// DASHBOARD
function loadDashboard(){

totalRooms.innerText = rooms.length;
totalTenants.innerText = tenants.length;

let totalCapacity = rooms.reduce((s,r)=>s+r.capacity,0);
let occupied = tenants.length;

availableSlots.innerText = totalCapacity - occupied;
}

// LOAD ALL
function loadAll(){
loadRooms();
loadRoomStatus();
loadDashboard();
}

// INIT
loadAll();

</script>

</body>
</html>
