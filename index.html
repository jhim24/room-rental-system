<!DOCTYPE html>
<html>
<head>
<title>Room Rental System PRO MAX</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.dashboard {
  display:flex;
  gap:10px;
}

.card {
  flex:1;
  padding:15px;
  background:#3498db;
  color:white;
  border-radius:10px;
  text-align:center;
}

input, select { padding:8px; margin:5px; }

button {
  padding:8px 12px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.deleteBtn { background:red; }
.editBtn { background:orange; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }
</style>
</head>

<body>

<h2>🏨 Room Rental System PRO MAX</h2>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card">Rooms<br><span id="totalRooms">0</span></div>
  <div class="card">Occupied<br><span id="occupiedRooms">0</span></div>
  <div class="card">Available<br><span id="availableRooms">0</span></div>
  <div class="card">Income<br><span id="totalIncome">0</span></div>
</div>

<!-- ROOM -->
<div class="box">
<h3>Add Room</h3>
<input type="text" id="roomNumber" placeholder="Room #">
<input type="number" id="roomPrice" placeholder="Price per head / room">
<input type="number" id="roomCapacity" placeholder="Capacity">
<button onclick="addRoom()">Add Room</button>
</div>

<!-- TENANT -->
<div class="box">
<h3>Add Tenant</h3>
<input type="text" id="tenantName" placeholder="Tenant Name">
<select id="category">
<option>Tenant</option>
<option>Bed Space</option>
<option>Freelancer</option>
<option>Staff</option>
</select>
<select id="roomSelect"></select>
<button onclick="addTenant()">Save Tenant</button>
</div>

<!-- TENANT LIST -->
<div class="box">
<h3>Tenant List</h3>
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tenantList"></tbody>
</table>
</div>

<!-- BILLING -->
<div class="box">
<h3>Monthly Billing</h3>
<select id="tenantSelect"></select>
<input type="month" id="month">
<input type="number" id="payment" placeholder="Payment">
<button onclick="addBilling()">Save / Update</button>
<button onclick="autoNextMonth()">Auto Next Month</button>
</div>

<!-- RECORDS -->
<div class="box">
<h3>Records</h3>
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Month</th>
<th>Rental</th>
<th>Payment</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
let billings = JSON.parse(localStorage.getItem("billings")) || [];
let editIndex = -1;

// SAVE
function save(){
  localStorage.setItem("rooms", JSON.stringify(rooms));
  localStorage.setItem("tenants", JSON.stringify(tenants));
  localStorage.setItem("billings", JSON.stringify(billings));
}

// DASHBOARD
function loadDashboard(){
  totalRooms.innerText = rooms.length;

  let occupied = tenants.length;
  occupiedRooms.innerText = occupied;

  let capacity = rooms.reduce((sum,r)=> sum + r.capacity,0);
  availableRooms.innerText = capacity - occupied;

  let income = billings.reduce((sum,b)=> sum + b.payment,0);
  totalIncome.innerText = income;
}

// ROOM
function addRoom(){
  if(!roomNumber.value || !roomPrice.value || !roomCapacity.value)
    return alert("Fill all");

  rooms.push({
    number:roomNumber.value,
    price:parseFloat(roomPrice.value),
    capacity:parseInt(roomCapacity.value),
    occupied:0
  });

  save();
  loadRooms();
  loadDashboard();

  roomNumber.value="";
  roomPrice.value="";
  roomCapacity.value="";
}

function loadRooms(){
  roomSelect.innerHTML="";
  rooms.forEach((r,i)=>{
    if(r.occupied < r.capacity){
      roomSelect.innerHTML += `
        <option value="${i}">
        ${r.number} (${r.occupied}/${r.capacity})
        </option>`;
    }
  });
}

// TENANT
function addTenant(){
  let room = rooms[roomSelect.value];

  if(room.occupied >= room.capacity){
    return alert("Room full!");
  }

  tenants.push({
    name:tenantName.value,
    category:category.value,
    room:room.number,
    rent:room.price
  });

  room.occupied++;

  save();
  loadTenants();
  loadRooms();
  loadTenantList();
  loadDashboard();

  tenantName.value="";
}

function loadTenants(){
  tenantSelect.innerHTML="";
  tenants.forEach((t,i)=>{
    tenantSelect.innerHTML += `<option value="${i}">
      ${t.name} - Room ${t.room}
    </option>`;
  });
}

function loadTenantList(){
  tenantList.innerHTML="";
  tenants.forEach((t,i)=>{
    tenantList.innerHTML += `
    <tr>
      <td>${i+1}</td>
      <td>${t.name}</td>
      <td>${t.room}</td>
      <td>${t.category}</td>
      <td>
        <button class="deleteBtn" onclick="deleteTenant(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

// DELETE TENANT
function deleteTenant(i){
  let t = tenants[i];

  let room = rooms.find(r=>r.number===t.room);
  if(room) room.occupied--;

  billings = billings.filter(b=>b.name!==t.name);
  tenants.splice(i,1);

  save();
  loadAll();
}

// FORMAT
function formatMonth(m){
  let d = new Date(m);
  return d.toLocaleString('default',{month:'long',year:'numeric'});
}

// BILLING
function addBilling(){
  let t = tenants[tenantSelect.value];
  let pay = parseFloat(payment.value) || 0;
  let rental = t.rent;
  let balance = rental - pay;

  if(!month.value) return alert("Select month");

  if(editIndex === -1){
    billings.push({...t, month:month.value, rental, payment:pay, balance});
  } else {
    billings[editIndex] = {...t, month:month.value, rental, payment:pay, balance};
    editIndex = -1;
  }

  save();
  loadAll();
}

// AUTO NEXT MONTH
function autoNextMonth(){
  if(billings.length===0) return;

  let last = billings[billings.length-1];
  let d = new Date(last.month);
  d.setMonth(d.getMonth()+1);

  billings.push({
    ...last,
    month:d.toISOString().slice(0,7),
    payment:0,
    balance:last.rental
  });

  save();
  loadAll();
}

// TABLE
function loadTable(){
  table.innerHTML="";
  billings.forEach((b,i)=>{
    let m = formatMonth(b.month);

    table.innerHTML += `
    <tr>
      <td>${i+1}</td>
      <td>${b.name}</td>
      <td>${b.room}</td>
      <td>${b.category}</td>
      <td>${m}</td>
      <td>${b.rental}</td>
      <td>${b.payment}</td>
      <td style="color:${b.balance>0?'red':'green'}">${b.balance}</td>
      <td>
        <button class="editBtn" onclick="editBilling(${i})">Edit</button>
        <button class="deleteBtn" onclick="deleteBilling(${i})">Delete</button>
      </td>
    </tr>`;
  });
}

// EDIT
function editBilling(i){
  let b = billings[i];
  tenantSelect.value = tenants.findIndex(t=>t.name===b.name);
  month.value = b.month;
  payment.value = b.payment;
  editIndex = i;
}

// DELETE BILLING
function deleteBilling(i){
  billings.splice(i,1);
  save();
  loadAll();
}

// LOAD ALL
function loadAll(){
  loadRooms();
  loadTenants();
  loadTenantList();
  loadTable();
  loadDashboard();
}

// INIT
loadAll();

</script>

</body>
</html>
