<!DOCTYPE html>
<html>
<head>
<title>Accommodation System PRO</title>

<style>
body { font-family: Arial; background:#eef3ff; padding:20px; }

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select { padding:8px; margin:5px; }

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:5px;
  color:white;
  cursor:pointer;
}

.saveBtn { background:green; }
.deleteBtn { background:red; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }
</style>

</head>

<body>

<h2>🏨 Accommodation System PRO</h2>

<!-- ROOM -->
<div class="box">
<h3>Add Room</h3>
<input id="roomNo" placeholder="Room Number">
<input id="capacity" type="number" placeholder="Capacity">
<button onclick="addRoom()">Add Room</button>
</div>

<!-- TENANT -->
<div class="box">
<h3>Add Tenant</h3>
<input id="tenantName" placeholder="Tenant Name">

<select id="roomSelect"></select>

<select id="category">
<option>Bed Space</option>
<option>Tenant</option>
<option>Freelancer</option>
<option>Company Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>

<button onclick="addTenant()">Save Tenant</button>
</div>

<!-- BILLING -->
<div class="box">
<h3>Billing</h3>
<select id="tenantSelect"></select>
<input type="month" id="month">
<input type="number" id="rent" placeholder="Rent">
<input type="number" id="payment" placeholder="Payment">
<button onclick="saveBilling()">Save</button>
</div>

<!-- ROOM STATUS -->
<div class="box">
<h3>Room Status</h3>
<table>
<thead>
<tr>
<th>Room</th>
<th>Capacity</th>
<th>Occupied</th>
<th>Available</th>
</tr>
</thead>
<tbody id="roomTable"></tbody>
</table>
</div>

<!-- RECORDS -->
<div class="box">
<h3>Records</h3>
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Month</th>
<th>Rent</th>
<th>Payment</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
let billings = JSON.parse(localStorage.getItem("billings")) || [];

// SAVE
function save(){
localStorage.setItem("rooms", JSON.stringify(rooms));
localStorage.setItem("tenants", JSON.stringify(tenants));
localStorage.setItem("billings", JSON.stringify(billings));
}

// ROOM
function addRoom(){
rooms.push({
number: roomNo.value,
capacity: Number(capacity.value),
occupied: 0
});
save();
loadAll();
}

// LOAD ROOMS
function loadRooms(){
roomSelect.innerHTML="";
rooms.forEach((r,i)=>{
roomSelect.innerHTML += `<option value="${i}">${r.number}</option>`;
});
}

// TENANT
function addTenant(){

let r = rooms[roomSelect.value];

if(r.occupied >= r.capacity){
return alert("Room full");
}

tenants.push({
name: tenantName.value,
room: r.number,
category: category.value
});

r.occupied++;

save();
loadAll();
}

// LOAD TENANTS
function loadTenants(){
tenantSelect.innerHTML="";
tenants.forEach((t,i)=>{
tenantSelect.innerHTML += `<option value="${i}">
${t.name} (${t.room})
</option>`;
});
}

// BILLING
function saveBilling(){

let t = tenants[tenantSelect.value];

let rentVal = Number(rent.value) || 0;
let payVal = Number(payment.value) || 0;

// CHECK EXISTING
let index = billings.findIndex(b =>
b.name === t.name && b.month === month.value
);

if(index !== -1){
billings[index].rent += rentVal;
billings[index].payment += payVal;
billings[index].balance =
billings[index].rent - billings[index].payment;
}else{
billings.push({
name: t.name,
room: t.room,
category: t.category,
month: month.value,
rent: rentVal,
payment: payVal,
balance: rentVal - payVal
});
}

save();
loadAll();
}

// RECORDS
function loadTable(){
table.innerHTML="";

billings.forEach((b,i)=>{
table.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.category}</td>
<td>${b.month}</td>
<td>${b.rent}</td>
<td>${b.payment}</td>
<td style="color:${b.balance>0?'red':'green'}">${b.balance}</td>
<td><button onclick="deleteBilling(${i})">Delete</button></td>
</tr>
`;
});
}

// DELETE
function deleteBilling(i){
billings.splice(i,1);
save();
loadAll();
}

// ROOM STATUS
function loadRoomStatus(){

roomTable.innerHTML="";

rooms.forEach(r=>{

let occupied = tenants.filter(t=>t.room===r.number).length;
let available = r.capacity - occupied;

roomTable.innerHTML += `
<tr>
<td>${r.number}</td>
<td>${r.capacity}</td>
<td>${occupied}</td>
<td style="color:${available>0?'green':'red'}">${available}</td>
</tr>
`;
});
}

// LOAD ALL
function loadAll(){
loadRooms();
loadTenants();
loadTable();
loadRoomStatus();
}

// INIT
loadAll();

</script>

</body>
</html>
