<!DOCTYPE html>
<html>
<head>
<title>Dynamic Report</title>

<style>
body{
  font-family:Segoe UI;
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

input, select{
  padding:6px;
  margin-right:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.loadBtn{background:#2ecc71;color:white;}
.refreshBtn{background:#3498db;color:white;}
.backBtn{background:#e74c3c;color:white;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:13px;
}

th{
  background:#2c3e50;
  color:white;
}
</style>
</head>

<body>

<div class="box header">
<h3>📊 Dynamic Monthly Report</h3>

<div>
<button class="loadBtn" onclick="loadReport()">Load</button>
<button class="refreshBtn" onclick="refreshPage()">Refresh</button>
<button class="backBtn" onclick="goDashboard()">🏠 Dashboard</button>
</div>
</div>

<div class="box">

From: <input type="date" id="fromDate">
To: <input type="date" id="toDate">

Client:
<select id="clientFilter">
<option value="">All</option>
</select>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>Name</th>
<th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th>
<th>May</th><th>Jun</th><th>Jul</th><th>Aug</th>
<th>Sep</th><th>Oct</th><th>Nov</th><th>Dec</th>
<th>Total</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

<script>

/* DATA */
function getJV(){
return JSON.parse(localStorage.getItem("jv")) || [];
}

function getClients(){
return JSON.parse(localStorage.getItem("tenants")) || [];
}

/* LOAD CLIENTS */
function loadClients(){
let clients = getClients();
clientFilter.innerHTML='<option value="">All</option>';

clients.forEach(c=>{
clientFilter.innerHTML += `<option value="${c.name}">${c.name}</option>`;
});
}

/* LOAD REPORT */
function loadReport(){

let jv = getJV();
let from = new Date(fromDate.value);
let to = new Date(toDate.value);
let selectedClient = clientFilter.value;

if(!fromDate.value || !toDate.value){
alert("Select date range");
return;
}

/* ===== GENERATE MONTH RANGE ===== */
let months = [];
let temp = new Date(from);

while(temp <= to){
months.push({
year: temp.getFullYear(),
month: temp.getMonth()
});
temp.setMonth(temp.getMonth() + 1);
}

/* ===== MAP ===== */
let map = {};

jv.forEach(entry=>{
entry.forEach(e=>{

if(!e.date) return;

let d = new Date(e.date);

// FILTER
if(d < from || d > to) return;

let name = e.client || "Unknown";
if(selectedClient && name !== selectedClient) return;

if(!map[name]){
map[name] = {};
}

/* KEY */
let key = d.getFullYear() + "-" + d.getMonth();

if(!map[name][key]){
map[name][key] = 0;
}

map[name][key] += Number(e.c) || 0;

});
});

/* ===== HEADER ===== */
let header = "<tr><th>Name</th>";

months.forEach(m=>{
let label = new Date(m.year, m.month)
.toLocaleString('default',{month:'short',year:'numeric'});

header += `<th>${label}</th>`;
});

header += "<th>Total</th></tr>";

document.querySelector("#reportTable").innerHTML = "";

/* ===== TABLE ===== */
let html = header;

Object.keys(map).forEach(name=>{

let total = 0;
html += "<tr>";
html += `<td>${name}</td>`;

months.forEach(m=>{
let key = m.year + "-" + m.month;
let val = map[name][key] || 0;

total += val;

html += `<td>${val.toFixed(2)}</td>`;
});

html += `<td><b>${total.toFixed(2)}</b></td>`;
html += "</tr>";

});

reportTable.innerHTML = html;
}

/* REFRESH */
function refreshPage(){
location.reload();
}

/* NAV */
function goDashboard(){
location.href="index.html?v=12";
}

/* INIT */
loadClients();

</script>

</body>
</html>
