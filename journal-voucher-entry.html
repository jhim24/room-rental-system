<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{
  font-family:Arial;
  background:#eef3ff;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select{
  padding:8px;
  margin:5px;
  width:200px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.saveBtn{background:#2ecc71;color:white;}
.clearBtn{background:#e74c3c;color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h3>📒 Journal Entry</h3>

<input id="acc" placeholder="Account (e.g. Accounts Receivable)">
<input id="sub" placeholder="Client Name">
<input id="amt" type="number" placeholder="Amount">

<select id="type">
  <option value="charge">Charge</option>
  <option value="payment">Payment</option>
</select>

<br>

<button class="saveBtn" onclick="saveJournal()">Save Entry</button>
<button class="clearBtn" onclick="clearJV()">Clear All</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Account</th>
<th>Client</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

<script>

// ✅ GET JV
function getJV(){
  try{
    return JSON.parse(localStorage.getItem("jv")) || [];
  }catch{
    return [];
  }
}

// ✅ SAVE JOURNAL (MAIN FIX)
function saveJournal(){

let acc = document.getElementById("acc").value.trim();
let sub = document.getElementById("sub").value.trim();
let amt = parseFloat(document.getElementById("amt").value) || 0;
let type = document.getElementById("type").value;

if(!acc || !sub || amt <= 0){
  alert("Invalid input");
  return;
}

let dc = "D";

// 🔥 AUTO LOGIC (IMPORTANT)
if(acc.toLowerCase().includes("receivable")){
  if(type === "payment"){
    dc = "C"; // ✅ PAYMENT = CREDIT (BABAWAS)
  }else{
    dc = "D"; // ✅ CHARGE = DEBIT
  }
}

// SAVE
let jv = getJV();

jv.push({
  acc: acc,
  sub: sub,
  amt: amt,
  dc: dc,
  type: type,
  date: new Date().toLocaleString()
});

localStorage.setItem("jv", JSON.stringify(jv));

alert("✅ Saved successfully!");

loadJV();

// clear inputs
document.getElementById("amt").value = "";
}

// ✅ LOAD TABLE
function loadJV(){

let jv = getJV();
let html = "";
let i = 1;

jv.forEach(e=>{

let dr = e.dc === "D" ? e.amt : "";
let cr = e.dc === "C" ? e.amt : "";

html += `
<tr>
<td>${i++}</td>
<td>${e.acc}</td>
<td>${e.sub}</td>
<td>${dr}</td>
<td>${cr}</td>
<td>${e.date}</td>
</tr>
`;

});

jvTable.innerHTML = html || "<tr><td colspan='6'>No data</td></tr>";
}

// ✅ CLEAR ALL
function clearJV(){
if(confirm("Clear all data?")){
  localStorage.removeItem("jv");
  loadJV();
}
}

// ✅ AUTO LOAD
window.onload = loadJV;

</script>

</body>
</html>
