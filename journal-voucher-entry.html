<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

input{padding:8px;margin:5px;width:180px;}
button{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;}

.saveBtn{background:#2ecc71;color:white;}
.clearBtn{background:#e74c3c;color:white;}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;}
th{background:#3498db;color:white;}
</style>
</head>

<body>

<div class="box">
<h3>📒 Journal Entry</h3>

<input id="accCode" placeholder="Account Code">
<input id="accName" placeholder="Account Name (Receivable)">
<input id="subCode" placeholder="Sub Code">
<input id="subName" placeholder="Client Name">

<br>

<input id="debit" type="number" placeholder="Debit">
<input id="credit" type="number" placeholder="Credit">

<br>

<button class="saveBtn" onclick="saveJournal()">Save Entry</button>
<button class="clearBtn" onclick="clearJV()">Clear All</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Acc Code</th>
<th>Account</th>
<th>Sub Code</th>
<th>Client</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

<script>

function getJV(){
  try{return JSON.parse(localStorage.getItem("jv"))||[];}
  catch{return [];}
}

// ✅ SAVE JOURNAL (FIXED + COMPLETE)
function saveJournal(){

let accCode = accCodeEl.value.trim();
let accName = accNameEl.value.trim();
let subCode = subCodeEl.value.trim();
let subName = subNameEl.value.trim();

let debit = parseFloat(debitEl.value) || 0;
let credit = parseFloat(creditEl.value) || 0;

if(!accName || !subName){
  alert("Missing data");
  return;
}

if(debit <= 0 && credit <= 0){
  alert("Enter Debit or Credit");
  return;
}

// 🔥 AUTO FIX (IMPORTANT)
if(accName.toLowerCase().includes("receivable")){
  
  // kung naglagay sa debit → charge
  if(debit > 0){
    credit = 0;
  }

  // kung naglagay sa credit → payment
  if(credit > 0){
    debit = 0;
  }
}

let jv = getJV();

// 👉 SAVE BOTH FORMAT (para compatible sa GL mo)
if(debit > 0){
  jv.push({
    accCode,
    acc: accName,
    subCode,
    sub: subName,
    amt: debit,
    dc: "D",
    date: new Date().toLocaleString()
  });
}

if(credit > 0){
  jv.push({
    accCode,
    acc: accName,
    subCode,
    sub: subName,
    amt: credit,
    dc: "C",
    date: new Date().toLocaleString()
  });
}

localStorage.setItem("jv", JSON.stringify(jv));

alert("✅ Saved!");

loadJV();

// clear
debitEl.value="";
creditEl.value="";
}

// ✅ LOAD
function loadJV(){

let jv = getJV();
let html="";
let i=1;

jv.forEach(e=>{

let dr = e.dc==="D" ? e.amt : "";
let cr = e.dc==="C" ? e.amt : "";

html+=`
<tr>
<td>${i++}</td>
<td>${e.accCode||""}</td>
<td>${e.acc}</td>
<td>${e.subCode||""}</td>
<td>${e.sub}</td>
<td>${dr}</td>
<td>${cr}</td>
<td>${e.date}</td>
</tr>
`;

});

jvTable.innerHTML = html || "<tr><td colspan='8'>No data</td></tr>";
}

// CLEAR
function clearJV(){
if(confirm("Clear all?")){
localStorage.removeItem("jv");
loadJV();
}
}

// ELEMENT SHORTCUTS
const accCodeEl = document.getElementById("accCode");
const accNameEl = document.getElementById("accName");
const subCodeEl = document.getElementById("subCode");
const subNameEl = document.getElementById("subName");
const debitEl = document.getElementById("debit");
const creditEl = document.getElementById("credit");

window.onload = loadJV;

</script>

</body>
</html>
