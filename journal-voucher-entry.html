<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.container {
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="container">

<div class="box">
<h3>Journal Entry</h3>

<div class="grid">

<select id="dc">
<option value="D">Debit</option>
<option value="C">Credit</option>
</select>

<select id="code" onchange="autoFillAccount()"></select>

<input id="accountName" placeholder="Account Name" readonly>

<select id="subDesc">
<option value="">None</option>
<option value="Tenant">Tenant</option>
<option value="Client">Client</option>
</select>

<input type="number" id="amount" placeholder="Amount">

<select id="subName"></select>

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Add Entry</button>

</div>

<div class="box">

<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>D/C</th>
<th>Code</th>
<th>Account Name</th>
<th>Sub Desc</th>
<th>Amount</th>
<th>Sub Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];

// LOAD COA
function loadCOA(){

let html = "<option value=''>Select Code</option>";

coa.forEach(a=>{
html += `<option value="${a.code}" data-name="${a.name}">
${a.code}
</option>`;
});

document.getElementById("code").innerHTML = html;
}

// AUTO FILL ACCOUNT NAME
function autoFillAccount(){

let select = document.getElementById("code");
let selected = select.options[select.selectedIndex];

let accName = selected.getAttribute("data-name");

document.getElementById("accountName").value = accName || "";
}

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
document.getElementById("subName").innerHTML = html;
}

// ADD ENTRY
function addEntry(){

let dcVal = document.getElementById("dc").value;
let codeVal = document.getElementById("code").value;
let accName = document.getElementById("accountName").value;
let subDescVal = document.getElementById("subDesc").value;
let amountVal = Number(document.getElementById("amount").value);
let subVal = document.getElementById("subName").value;

if(!codeVal || !accName){
alert("Select account");
return;
}

if(amountVal <= 0){
alert("Enter amount");
return;
}

// 🔥 ONLY AR CAN HAVE CLIENT
if(codeVal !== "1100"){
subVal = "";
subDescVal = "";
}

// SAVE
entries.push({
dc:dcVal,
code:codeVal,
account:accName,
subDesc:subDescVal,
amount:amountVal,
subName:subVal
});

localStorage.setItem("jv", JSON.stringify(entries));

loadTable();
clearForm();
}

// LOAD TABLE
function loadTable(){

let html = "";

entries.forEach((e,i)=>{

html += `
<tr>
<td>${e.dc}</td>
<td>${e.code}</td>
<td>${e.account}</td>
<td>${e.subDesc}</td>
<td>${e.amount}</td>
<td>${e.subName}</td>
<td>
<button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button>
</td>
</tr>
`;

});

document.getElementById("table").innerHTML = html;
}

// DELETE
function deleteEntry(i){
if(confirm("Delete entry?")){
entries.splice(i,1);
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}
}

// CLEAR
function clearForm(){
document.getElementById("amount").value="";
}

// INIT
loadCOA();
loadClients();
loadTable();

</script>

</body>
</html>
