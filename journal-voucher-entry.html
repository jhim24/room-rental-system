<!DOCTYPE html>
<html>
<head>
<title>Mini Accounting System</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}
.tabs button{padding:10px;margin-right:5px;border:none;border-radius:5px;cursor:pointer;background:#3498db;color:white;}
.hidden{display:none;}

.grid{
  display:grid;
  grid-template-columns: 60px 120px 200px 120px 200px 120px;
  gap:5px;
  margin-bottom:5px;
}
.grid input,.grid select{padding:6px;width:100%;}
.header{background:#2c3e50;color:white;font-weight:bold;text-align:center;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#3498db;color:white;}
</style>
</head>

<body>

<div class="tabs">
<button onclick="showTab('journal')">Journal</button>
<button onclick="showTab('tenant')">Tenant Ledger</button>
<button onclick="showTab('general')">General Ledger</button>
</div>

<!-- ================= JOURNAL ================= -->
<div id="journal" class="box">

<h3>📒 Journal Entry</h3>

<div class="grid header">
<div>D/C</div><div>Acc Code</div><div>Account</div>
<div>Sub Code</div><div>Client</div><div>Amount</div>
</div>

<div id="rows"></div>

<button onclick="addRow()">+ Add Row</button>
<button onclick="saveJournal()">Save</button>

</div>

<!-- ================= TENANT LEDGER ================= -->
<div id="tenant" class="box hidden">
<h3>👤 Tenant Ledger</h3>
<select id="tenantSelect" onchange="loadTenantLedger()"></select>

<table>
<thead>
<tr><th>Date</th><th>Debit</th><th>Credit</th><th>Balance</th></tr>
</thead>
<tbody id="tenantTable"></tbody>
</table>
</div>

<!-- ================= GENERAL LEDGER ================= -->
<div id="general" class="box hidden">
<h3>📘 General Ledger (AR)</h3>

<table>
<thead>
<tr><th>Client</th><th>Debit</th><th>Credit</th><th>Balance</th></tr>
</thead>
<tbody id="glTable"></tbody>
</table>

</div>

<script>

// ================= DATA =================
const accounts={
 "AR-001":"Accounts Receivable",
 "CASH-001":"Cash",
 "REV-001":"Revenue"
};

const clients={
 "C-001":"Juan",
 "C-002":"Pedro"
};

// ================= TAB =================
function showTab(tab){
document.querySelectorAll(".box").forEach(b=>b.classList.add("hidden"));
document.getElementById(tab).classList.remove("hidden");
if(tab==="tenant") loadTenantDropdown();
if(tab==="general") loadGL();
}

// ================= ROW SYSTEM =================
let rowCount=0;

function addRow(){
rowCount++;

let div=document.createElement("div");
div.className="grid";
div.innerHTML=`
<select id="dc${rowCount}">
<option>D</option><option>C</option>
</select>

<select id="acc${rowCount}" onchange="fillAcc(${rowCount})">
<option value="">Select</option>
${Object.keys(accounts).map(c=>`<option>${c}</option>`).join("")}
</select>

<input id="name${rowCount}" readonly>

<select id="sub${rowCount}" onchange="fillClient(${rowCount})">
<option value="">Select</option>
${Object.keys(clients).map(c=>`<option>${c}</option>`).join("")}
</select>

<input id="client${rowCount}" readonly>
<input id="amt${rowCount}" type="number">
`;

rows.appendChild(div);
}

// AUTO FILL
function fillAcc(i){
let code=document.getElementById("acc"+i).value;
name"+i
document.getElementById("name"+i).value=accounts[code]||"";
}

function fillClient(i){
let code=document.getElementById("sub"+i).value;
document.getElementById("client"+i).value=clients[code]||"";
}

// ================= SAVE =================
function saveJournal(){

let jv=JSON.parse(localStorage.getItem("jv"))||[];

for(let i=1;i<=rowCount;i++){

let dc=document.getElementById("dc"+i).value;
let accCode=document.getElementById("acc"+i).value;
let accName=document.getElementById("name"+i).value;
let subCode=document.getElementById("sub"+i).value;
let subName=document.getElementById("client"+i).value;
let amt=parseFloat(document.getElementById("amt"+i).value)||0;

if(!accName||!subName||amt<=0) continue;

// RECEIVABLE FIX
if(accName.toLowerCase().includes("receivable")){
if(dc==="D"){}
if(dc==="C"){}
}

jv.push({
date:new Date().toISOString().split("T")[0],
accCode,acc:accName,
subCode,sub:subName,
amt,dc
});

}

localStorage.setItem("jv",JSON.stringify(jv));
alert("Saved!");
}

// ================= TENANT LEDGER =================
function loadTenantDropdown(){
let select=document.getElementById("tenantSelect");
select.innerHTML=Object.values(clients).map(c=>`<option>${c}</option>`).join("");
}

function loadTenantLedger(){

let name=tenantSelect.value;
let jv=JSON.parse(localStorage.getItem("jv"))||[];

let balance=0;
let html="";

jv.filter(e=>e.sub===name).forEach(e=>{

let dr=e.dc==="D"?e.amt:0;
let cr=e.dc==="C"?e.amt:0;

balance+=dr-cr;

html+=`
<tr>
<td>${e.date}</td>
<td>${dr}</td>
<td>${cr}</td>
<td>${balance}</td>
</tr>`;
});

tenantTable.innerHTML=html;
}

// ================= GENERAL LEDGER =================
function loadGL(){

let jv=JSON.parse(localStorage.getItem("jv"))||[];
let map={};

jv.forEach(e=>{
if(!e.acc.toLowerCase().includes("receivable")) return;

if(!map[e.sub]) map[e.sub]={dr:0,cr:0};

if(e.dc==="D") map[e.sub].dr+=e.amt;
if(e.dc==="C") map[e.sub].cr+=e.amt;
});

let html="";
Object.keys(map).forEach(name=>{
let dr=map[name].dr;
let cr=map[name].cr;
let bal=dr-cr;

html+=`<tr>
<td>${name}</td>
<td>${dr}</td>
<td>${cr}</td>
<td>${bal}</td>
</tr>`;
});

glTable.innerHTML=html;
}

// INIT
addRow();
addRow();

</script>

</body>
</html>
