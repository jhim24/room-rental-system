<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher Pro</title>

<style>

/* ===== BACKGROUND ===== */
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

/* ===== CONTAINER ===== */
.container{
  width:95%;
  margin:20px auto;
}

/* ===== CARD ===== */
.card{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  margin-bottom:15px;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h2{ margin:0; }

/* ===== BUTTONS ===== */
.btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.blue{background:#3498db;color:white;}
.green{background:#2ecc71;color:white;}
.orange{background:#f39c12;color:white;}
.red{background:#e74c3c;color:white;}

/* ===== FIXED FORM ALIGNMENT ===== */
.form{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:20px;
  margin-top:15px;
}

.form label{
  font-weight:600;
  margin-bottom:5px;
  display:block;
}

.form input, .form textarea{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

.form textarea{
  min-height:60px;
  resize:vertical;
}

/* ===== GRID HEADER ===== */
.grid-header{
  display:grid;
  grid-template-columns:40px 70px 120px 180px 150px 200px 120px 120px 80px;
  background:#2c3e50;
  color:white;
  margin-top:15px;
}

.grid-header div{
  padding:8px;
  border:1px solid #555;
  text-align:center;
}

/* ===== ROW ===== */
.row{
  display:grid;
  grid-template-columns:40px 70px 120px 180px 150px 200px 120px 120px 80px;
}

.row input, .row select{
  padding:6px;
  border:1px solid #ccc;
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:10px;
}

th,td{
  border:1px solid #999;
  padding:8px;
  text-align:center;
}

th{
  background:#2980b9;
  color:white;
}

/* ===== TOTAL ===== */
.footer{
  display:flex;
  justify-content:flex-end;
  gap:20px;
  margin-top:10px;
}

.total{
  background:#ecf0f1;
  padding:10px;
  border-radius:6px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
  <h2>📒 Journal Voucher</h2>
  <div>
    <button class="btn blue" onclick="addRow()">+ Row</button>
    <button class="btn green" onclick="saveJournal()">Save</button>
    <button class="btn orange" onclick="updateJournal()">Update</button>
  </div>
</div>

<!-- ✅ FIXED FORM -->
<div class="form">

  <div>
    <label>Ref No</label>
    <input id="ref">
  </div>

  <div>
    <label>Remarks</label>
    <textarea id="remarks"></textarea>
  </div>

</div>

<!-- GRID -->
<div class="grid-header">
  <div>#</div>
  <div>D/C</div>
  <div>Code</div>
  <div>Account</div>
  <div>Client</div>
  <div>Narration</div>
  <div>Debit</div>
  <div>Credit</div>
  <div>Del</div>
</div>

<div id="rows"></div>

<div class="footer">
  <div class="total">Debit: <span id="totalDr">0</span></div>
  <div class="total">Credit: <span id="totalCr">0</span></div>
</div>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>#</th>
<th>Account</th>
<th>Client</th>
<th>Narration</th>
<th>Debit</th>
<th>Credit</th>
<th>Action</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

</table>

</div>

</div>

<script>

/* SAMPLE DATA */
if(!localStorage.getItem("accounts")){
localStorage.setItem("accounts",JSON.stringify([
{code:"1000",name:"Cash"},
{code:"1100",name:"Accounts Receivable"},
{code:"4000",name:"Income"}
]));
}

if(!localStorage.getItem("clients")){
localStorage.setItem("clients",JSON.stringify([
{name:"Juan Dela Cruz"},
{name:"Maria Santos"}
]));
}

let editIndex=null;

/* FUNCTIONS */
function getAccounts(){return JSON.parse(localStorage.getItem("accounts"))||[];}
function getClients(){return JSON.parse(localStorage.getItem("clients"))||[];}
function getJV(){return JSON.parse(localStorage.getItem("jv"))||[];}
function saveJV(d){localStorage.setItem("jv",JSON.stringify(d));}

/* ADD ROW */
function addRow(){

let i=document.querySelectorAll(".row").length+1;

let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input value="${i}" readonly>
<select class="dc"><option>D</option><option>C</option></select>
<select class="code"></select>
<input class="name" readonly>
<select class="client"></select>
<input class="nar">
<input class="debit" type="number" oninput="calc()">
<input class="credit" type="number" oninput="calc()">
<button onclick="this.parentElement.remove();calc()">X</button>
`;

rows.appendChild(div);

/* LOAD ACCOUNTS */
let accSel=div.querySelector(".code");
accSel.innerHTML='<option value="">Select</option>';
getAccounts().forEach(a=>{
accSel.innerHTML+=`<option value="${a.code}" data-name="${a.name}">${a.code}</option>`;
});

/* LOAD CLIENTS */
let cliSel=div.querySelector(".client");
cliSel.innerHTML='<option value="">Select</option>';
getClients().forEach(c=>{
cliSel.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
});

/* AUTO NAME */
accSel.onchange=function(){
div.querySelector(".name").value=this.options[this.selectedIndex]?.dataset.name||"";
};

}

/* CALC */
function calc(){
let dr=0,cr=0;
document.querySelectorAll(".row").forEach(r=>{
dr+=Number(r.querySelector(".debit").value)||0;
cr+=Number(r.querySelector(".credit").value)||0;
});
totalDr.innerText=dr.toFixed(2);
totalCr.innerText=cr.toFixed(2);
}

/* SAVE */
function saveJournal(){

let jv=getJV();
let entry=[];
let dr=0,cr=0;

document.querySelectorAll(".row").forEach(r=>{
let acc=r.querySelector(".name").value;
let client=r.querySelector(".client").value;
let nar=r.querySelector(".nar").value;
let d=Number(r.querySelector(".debit").value)||0;
let c=Number(r.querySelector(".credit").value)||0;

if(!acc || (d==0 && c==0)) return;

dr+=d; cr+=c;

entry.push({acc,client,nar,d,c});
});

if(dr!==cr){alert("❌ Debit must equal Credit");return;}

jv.push(entry);
saveJV(jv);
loadRecords();
clearForm();
}

/* LOAD */
function loadRecords(){

let jv=getJV();
let html="";

jv.forEach((entry,i)=>{
entry.forEach(e=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${e.acc}</td>
<td>${e.client}</td>
<td>${e.nar}</td>
<td>${e.d}</td>
<td>${e.c}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Del</button>
</td>
</tr>`;
});
});

recordTable.innerHTML=html;
}

/* EDIT */
function edit(i){
let jv=getJV();
let entry=jv[i];

rows.innerHTML="";

entry.forEach(e=>{
addRow();
let r=rows.lastElementChild;
r.querySelector(".name").value=e.acc;
r.querySelector(".client").value=e.client;
r.querySelector(".nar").value=e.nar;
r.querySelector(".debit").value=e.d;
r.querySelector(".credit").value=e.c;
});

editIndex=i;
}

/* UPDATE */
function updateJournal(){
if(editIndex===null){alert("Select entry first");return;}
let jv=getJV();
jv.splice(editIndex,1);
saveJV(jv);
editIndex=null;
saveJournal();
}

/* DELETE */
function del(i){
let jv=getJV();
if(confirm("Delete?")){
jv.splice(i,1);
saveJV(jv);
loadRecords();
}
}

/* CLEAR */
function clearForm(){
rows.innerHTML="";
addRow();
addRow();
calc();
}

/* INIT */
addRow();
addRow();
loadRecords();

</script>

</body>
</html>
