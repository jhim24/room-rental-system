<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns
    : 60px 150px 200px 150px 200px 120px 100px;
  gap:5px;
  margin-bottom:5px;
}

.grid input,.grid select{padding:6px;width:100%;}

.header{
  background:#2c3e50;
  color:white;
  font-weight:bold;
  text-align:center;
}

button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
.addBtn{background:#3498db;color:white;}
.saveBtn{background:#2ecc71;color:white;}
.delBtn{background:#e74c3c;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#3498db;color:white;}

.total{font-weight:bold;background:#f1f1f1;}
</style>
</head>

<body>

<div class="box">

<h3>📒 Journal Entry</h3>

<div class="grid header">
<div>D/C</div>
<div>Acc Code</div>
<div>Account Name</div>
<div>Client</div>
<div>Narration</div>
<div>Amount</div>
<div>Action</div>
</div>

<div id="rows"></div>

<button class="addBtn" onclick="addRow()">+ Add Row</button>
<button class="saveBtn" onclick="saveJournal()">Save</button>

</div>

<div class="box">

<h3>📋 Journal Records</h3>

<table>
<thead>
<tr>
<th>Sr No.</th>
<th>Account</th>
<th>Client</th>
<th>Narration</th>
<th>Cr</th>
<th>Dr</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

<tfoot>
<tr class="total">
<td colspan="4">TOTAL</td>
<td id="totalCr">0</td>
<td id="totalDr">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

// ===== STORAGE =====
function getAccounts(){
  return JSON.parse(localStorage.getItem("accounts")) || [];
}

function getClients(){

let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

return tenants.map((t,i)=>({
  id: "C" + String(i+1).padStart(3,"0"),
  name: t.name
}));

}

// ===== VARIABLES =====
let rowCount = 0;

// ===== ADD ROW =====
function addRow(){
rowCount++;

let div = document.createElement("div");
div.className="grid";
div.id="row"+rowCount;

div.innerHTML=`

<select id="dc${rowCount}">
<option>D</option>
<option>C</option>
</select>

<select id="accCode${rowCount}" onchange="fillAccount(${rowCount})"></select>

<input id="name${rowCount}" readonly>

<select id="sub${rowCount}" onchange="fillClient(${rowCount})"></select>

<input id="nar${rowCount}" placeholder="Narration">

<input id="amt${rowCount}" type="number">

<button class="delBtn" onclick="deleteRow(${rowCount})">X</button>
`;

document.getElementById("rows").appendChild(div);

loadAccountDropdown(rowCount);
loadClientDropdown(rowCount);
}

// ===== DELETE =====
function deleteRow(i){
let el = document.getElementById("row"+i);
if(el) el.remove();
}

// ===== LOAD ACCOUNTS =====
function loadAccountDropdown(row){

let accounts = getAccounts();
let select = document.getElementById("accCode"+row);

select.innerHTML = '<option value="">Select</option>';

accounts.forEach(acc=>{
select.innerHTML += `
<option value="${acc.code}" data-name="${acc.name}">
${acc.code} - ${acc.name}
</option>
`;
});
}

// ===== LOAD CLIENTS =====
function loadClientDropdown(row){

let clients = getClients();
let select = document.getElementById("sub"+row);

select.innerHTML = '<option value="">Select Client</option>';

clients.forEach(c=>{
select.innerHTML += `
<option value="${c.name}">
${c.id} - ${c.name}
</option>
`;
});
}

// ===== AUTO ACCOUNT NAME =====
function fillAccount(row){
let select = document.getElementById("accCode"+row);
let name = select.options[select.selectedIndex]?.dataset.name;
document.getElementById("name"+row).value = name || "";
}

// ===== AUTO CLIENT NAME (ALREADY IN VALUE) =====
function fillClient(row){
let select = document.getElementById("sub"+row);
let name = select.value;
}

// ===== SAVE =====
function saveJournal(){

<script>

let jv = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

let editIndex = -1;

// LOAD COA
function loadCOA(){
let html="<option value=''>Select</option>";

coa.forEach(a=>{
html+=`<option value="${a.code}" data-name="${a.name}">
${a.code} - ${a.name}
</option>`;
});

code1.innerHTML=html;
code2.innerHTML=html;
}

// AUTO ACCOUNT
function autoFill(r){
let s=document.getElementById("code"+r);
let selected=s.options[s.selectedIndex];
let name=selected.getAttribute("data-name");
document.getElementById("name"+r).value=name||"";
}

// LOAD CLIENT
function loadClients(){
let html="<option value=''>Select</option>";

tenants.forEach(t=>{
html+=`<option value="${t.name}">${t.name}</option>`;
});

sub1.innerHTML=html;
sub2.innerHTML=html;
}

// SAVE / UPDATE
function save(){

let d=date.value;
let nar=narration.value;

if(!d) return alert("Select date");

// DELETE OLD IF EDIT
if(editIndex !== -1){
jv.splice(editIndex,2);
}

[1,2].forEach(r=>{

let dc=document.getElementById("dc"+r).value;
let code=document.getElementById("code"+r).value;
let acc=document.getElementById("name"+r).value;
let amt=Number(document.getElementById("amt"+r).value);
let sub=document.getElementById("sub"+r).value;

if(!code || !acc || amt<=0) return;

// ONLY AR MAY CLIENT
if(!(acc||"").toLowerCase().includes("receivable")){
sub="";
}

jv.push({
date:d,
dc:dc,
code:code,
acc:acc,
amt:amt,
sub:(sub||"").trim(),
nar:nar
});

});

localStorage.setItem("jv",JSON.stringify(jv));

editIndex = -1;

load();
clearForm();
}

// LOAD TABLE
function load(){

let html="";
let dr=0;
let cr=0;

jv.forEach((e,i)=>{

let d=e.dc==="D"?e.amt:"";
let c=e.dc==="C"?e.amt:"";

if(d) dr+=e.amt;
if(c) cr+=e.amt;

html+=`
<tr>
<td>${i+1}</td>
<td>${e.code}</td>
<td>${e.acc}${e.sub?" - "+e.sub:""}</td>
<td>${e.nar||""}</td>
<td>${d}</td>
<td>${c}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>
</td>
</tr>`;
});

tbl.innerHTML=html;
tdr.innerText=dr;
tcr.innerText=cr;
drTxt.innerText="Dr: "+dr;
crTxt.innerText="Cr: "+cr;
}

// EDIT
function edit(i){

let e1 = jv[i];
let e2 = jv[i+1];

// LOAD ROW 1
dc1.value = e1.dc;
code1.value = e1.code;
name1.value = e1.acc;
amt1.value = e1.amt;
sub1.value = e1.sub;

// LOAD ROW 2
dc2.value = e2.dc;
code2.value = e2.code;
name2.value = e2.acc;
amt2.value = e2.amt;
sub2.value = e2.sub;

date.value = e1.date;
narration.value = e1.nar;

editIndex = i;
}

// DELETE
function del(i){

if(confirm("Delete this entry?")){

// DELETE 2 ROWS (PAIR)
jv.splice(i,2);

localStorage.setItem("jv",JSON.stringify(jv));
load();
}
}

// CLEAR
function clearForm(){
amt1.value="";
amt2.value="";
}

// INIT
loadCOA();
loadClients();
load();

</script>

</body>
</html>
