<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:Segoe UI, Tahoma;
  background:#f4f6fb;
}

/* ===== CONTAINER ===== */
.container{
  width:95%;
  margin:20px auto;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:15px 20px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.header h2{
  margin:0;
  color:#2c3e50;
}

/* ===== BUTTONS ===== */
.btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn-blue{background:#3498db;color:white;}
.btn-green{background:#2ecc71;color:white;}
.btn-red{background:#e74c3c;color:white;}
.btn-gray{background:#bdc3c7;color:black;}

/* ===== FORM ===== */
.form{
  margin-top:15px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  display:flex;
  gap:15px;
}

.form input, .form textarea{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  width:100%;
}

/* ===== GRID HEADER ===== */
.grid-header{
  margin-top:15px;
  display:grid;
  grid-template-columns:50px 70px 120px 200px 150px 200px 120px 120px 80px;
  background:#34495e;
  color:white;
  border-radius:6px 6px 0 0;
}

.grid-header div{
  padding:10px;
  text-align:center;
  font-weight:bold;
  border-right:1px solid #2c3e50;
}

/* ===== GRID BODY ===== */
.rows{
  background:white;
  border:1px solid #ddd;
  border-top:none;
}

.row{
  display:grid;
  grid-template-columns:50px 70px 120px 200px 150px 200px 120px 120px 80px;
}

.row input, .row select{
  padding:6px;
  border:1px solid #ddd;
  width:100%;
}

/* ===== FOOTER ===== */
.footer{
  margin-top:10px;
  display:flex;
  justify-content:flex-end;
  gap:20px;
}

.total-box{
  background:#fff;
  padding:10px 20px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  font-weight:bold;
}

/* ===== RECORD TABLE ===== */
.table{
  margin-top:20px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.table table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  background:#2980b9;
  color:white;
  padding:10px;
}

.table td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <h2>📒 Journal Voucher</h2>
  <div>
    <button class="btn btn-blue" onclick="addRow()">+ Row</button>
    <button class="btn btn-green" onclick="saveJournal()">Save</button>
  </div>
</div>

<!-- FORM -->
<div class="form">
  <div>
    Ref No<br>
    <input id="ref">
  </div>

  <div style="flex:1">
    Remarks<br>
    <textarea id="remarks"></textarea>
  </div>
</div>

<!-- GRID HEADER -->
<div class="grid-header">
  <div>SN</div>
  <div>D/C</div>
  <div>Code</div>
  <div>Account</div>
  <div>Client</div>
  <div>Narration</div>
  <div>Debit</div>
  <div>Credit</div>
  <div>Del</div>
</div>

<!-- ROWS -->
<div id="rows" class="rows"></div>

<!-- FOOTER -->
<div class="footer">
  <div class="total-box">Debit: <span id="totalDr">0</span></div>
  <div class="total-box">Credit: <span id="totalCr">0</span></div>
</div>

<!-- RECORDS -->
<div class="table">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Account</th>
        <th>Client</th>
        <th>Debit</th>
        <th>Credit</th>
      </tr>
    </thead>
    <tbody id="recordTable"></tbody>
  </table>
</div>

</div>

<script>

/* ===== SAMPLE DATA ===== */
if(!localStorage.getItem("accounts")){
localStorage.setItem("accounts",JSON.stringify([
{code:"1000",name:"Cash"},
{code:"1100",name:"Accounts Receivable"},
{code:"4000",name:"Income"}
]));
}

/* ===== FUNCTIONS ===== */

function getAccounts(){
return JSON.parse(localStorage.getItem("accounts")) || [];
}

function addRow(){

let index = document.querySelectorAll(".row").length + 1;

let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input value="${index}" readonly>

<select class="dc">
<option>D</option>
<option>C</option>
</select>

<select class="code"></select>

<input class="name" readonly>

<input class="client">

<input class="nar">

<input class="debit" type="number" oninput="calc()">

<input class="credit" type="number" oninput="calc()">

<button onclick="this.parentElement.remove();calc()">X</button>
`;

rows.appendChild(div);

/* LOAD ACCOUNTS */
let accSel = div.querySelector(".code");
accSel.innerHTML='<option value="">Select</option>';

getAccounts().forEach(a=>{
accSel.innerHTML+=`<option value="${a.code}" data-name="${a.name}">
${a.code}</option>`;
});

/* AUTO NAME */
accSel.onchange=function(){
let name = this.options[this.selectedIndex]?.dataset.name;
div.querySelector(".name").value = name || "";
};

}

/* ===== CALCULATE ===== */
function calc(){
let dr=0, cr=0;

document.querySelectorAll(".row").forEach(r=>{
dr += Number(r.querySelector(".debit").value) || 0;
cr += Number(r.querySelector(".credit").value) || 0;
});

totalDr.innerText = dr.toFixed(2);
totalCr.innerText = cr.toFixed(2);
}

/* ===== SAVE ===== */
function saveJournal(){

let rowsList=document.querySelectorAll(".row");

let entry=[];
let dr=0, cr=0;

rowsList.forEach(r=>{

let dc=r.querySelector(".dc").value;
let acc=r.querySelector(".name").value;
let client=r.querySelector(".client").value;
let d=Number(r.querySelector(".debit").value)||0;
let c=Number(r.querySelector(".credit").value)||0;

if(!acc || (d==0 && c==0)) return;

dr+=d; cr+=c;

entry.push({acc,client,d,c});

});

if(dr!==cr){
alert("❌ Debit must equal Credit");
return;
}

let html="";

entry.forEach((e,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${e.acc}</td>
<td>${e.client}</td>
<td>${e.d}</td>
<td>${e.c}</td>
</tr>`;
});

recordTable.innerHTML+=html;

alert("✅ Saved!");

rows.innerHTML="";
addRow();
calc();
}

/* INIT */
addRow();
addRow();

</script>

</body>
</html>
