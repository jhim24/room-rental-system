<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns:60px 140px 180px 180px 180px 100px 80px;
  gap:5px;
  margin-bottom:5px;
}

.grid input,.grid select{padding:6px;width:100%;}

.header{
  background:#2c3e50;
  color:white;
  font-weight:bold;
  text-align:center;
}

button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
.addBtn{background:#3498db;color:white;}
.saveBtn{background:#2ecc71;color:white;}
.delBtn{background:#e74c3c;color:white;}
.editBtn{background:#f39c12;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#3498db;color:white;}

.total{font-weight:bold;background:#f1f1f1;}
</style>
</head>

<body>

<div class="box">

<h3>📒 Journal Entry</h3>

<div class="grid header">
<div>D/C</div>
<div>Code</div>
<div>Account</div>
<div>Client</div>
<div>Narration</div>
<div>Amount</div>
<div>Action</div>
</div>

<div id="rows"></div>

<button class="addBtn" onclick="addRow()">+ Add Row</button>
<button class="saveBtn" onclick="saveJournal()">Save</button>

</div>

<div class="box">

<h3>📋 Journal Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Account</th>
<th>Client</th>
<th>Narration</th>
<th>Cr</th>
<th>Dr</th>
<th>Action</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

<tfoot>
<tr class="total">
<td colspan="4">TOTAL</td>
<td id="totalCr">0</td>
<td id="totalDr">0</td>
<td></td>
</tr>
</tfoot>

</table>

</div>

<script>

let rowCount = 0;
let editIndex = -1;

// ===== DATA =====
function getAccounts(){
return JSON.parse(localStorage.getItem("accounts")) || [];
}

function getTenants(){
return JSON.parse(localStorage.getItem("tenants")) || [];
}

function getJV(){
return JSON.parse(localStorage.getItem("jv")) || [];
}

function saveJV(data){
localStorage.setItem("jv", JSON.stringify(data));
}

// ===== ADD ROW =====
function addRow(){
rowCount++;

let div=document.createElement("div");
div.className="grid";
div.id="row"+rowCount;

div.innerHTML=`
<select id="dc${rowCount}">
<option>D</option>
<option>C</option>
</select>

<select id="code${rowCount}" onchange="fillAcc(${rowCount})"></select>

<input id="name${rowCount}" readonly>

<select id="sub${rowCount}"></select>

<input id="nar${rowCount}" placeholder="Narration">

<input id="amt${rowCount}" type="number">

<button class="delBtn" onclick="deleteRow(${rowCount})">X</button>
`;

rows.appendChild(div);
loadAccounts(rowCount);
loadClients(rowCount);
}

// ===== DELETE ROW =====
function deleteRow(i){
let el=document.getElementById("row"+i);
if(el) el.remove();
}

// ===== LOAD ACCOUNTS =====
function loadAccounts(r){
let data=getAccounts();
let sel=document.getElementById("code"+r);

sel.innerHTML='<option value="">Select</option>';

data.forEach(a=>{
sel.innerHTML+=`<option value="${a.code}" data-name="${a.name}">
${a.code} - ${a.name}
</option>`;
});
}

// ===== LOAD CLIENTS =====
function loadClients(r){
let data=getTenants();
let sel=document.getElementById("sub"+r);

sel.innerHTML='<option value="">Client</option>';

data.forEach(t=>{
sel.innerHTML+=`<option value="${t.name}">${t.name}</option>`;
});
}

// ===== AUTO ACCOUNT =====
function fillAcc(r){
let s=document.getElementById("code"+r);
let name=s.options[s.selectedIndex]?.dataset.name;
document.getElementById("name"+r).value=name||"";
}

// ===== SAVE =====
function saveJournal(){

let jv = JSON.parse(localStorage.getItem("jv")) || [];

let entry = [];

// LOOP ALL ROWS
for(let i=1;i<=rowCount;i++){

let dcEl = document.getElementById("dc"+i);
let codeEl = document.getElementById("code"+i);
let nameEl = document.getElementById("name"+i);
let subEl = document.getElementById("sub"+i);
let narEl = document.getElementById("nar"+i);
let amtEl = document.getElementById("amt"+i);

if(!code){
alert("⚠️ Please select Account Code");
return;
}

if(amt <= 0){
alert("⚠️ Please enter Amount");
return;
}
let dc = dcEl.value;
let code = codeEl.value;
let acc = nameEl.value;
let sub = subEl ? subEl.value : "";
let nar = narEl ? narEl.value : "";
let amt = Number(amtEl.value);

// 🔥 STRICT VALIDATION
if(!code || !acc || amt <= 0) continue;

// ONLY AR may client
if(!(acc||"").toLowerCase().includes("receivable")){
sub = "";
}

// PUSH ENTRY
entry.push({
dc:dc,
code:code,
acc:acc,
sub:(sub||"").trim(),
nar:nar,
amt:amt
});

}

// 🚨 IF WALANG DATA
if(entry.length === 0){
alert("❌ No valid data to save");
return;
}

// SAVE
jv.push(entry);
localStorage.setItem("jv", JSON.stringify(jv));

// REFRESH
loadRecords();
clearForm();

alert("✅ Saved Successfully");

}

// ===== LOAD RECORDS =====
function loadRecords(){

let jv=getJV();
let html="";
let dr=0,cr=0;

jv.forEach((entry,i)=>{

entry.forEach(e=>{

let d=e.dc==="D"?e.amt:"";
let c=e.dc==="C"?e.amt:"";

if(d) dr+=e.amt;
if(c) cr+=e.amt;

html+=`
<tr>
<td>${i+1}</td>
<td>${e.acc}</td>
<td>${e.sub||""}</td>
<td>${e.nar||""}</td>
<td>${c}</td>
<td>${d}</td>
<td>
<button class="editBtn" onclick="edit(${i})">Edit</button>
<button class="delBtn" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});

});

recordTable.innerHTML=html;
totalCr.innerText=cr;
totalDr.innerText=dr;
}

// ===== EDIT =====
function edit(i){

let jv=getJV();
let entry=jv[i];

clearForm();

entry.forEach((e,idx)=>{
addRow();

let r=rowCount;

document.getElementById("dc"+r).value=e.dc;
document.getElementById("code"+r).value=e.code;
fillAcc(r);
document.getElementById("amt"+r).value=e.amt;
document.getElementById("sub"+r).value=e.sub;
document.getElementById("nar"+r).value=e.nar;
});

editIndex=i;
}

// ===== DELETE =====
function del(i){
let jv=getJV();
if(confirm("Delete entry?")){
jv.splice(i,1);
saveJV(jv);
loadRecords();
}
}

// ===== CLEAR =====
function clearForm(){
rows.innerHTML="";
rowCount=0;
addRow();
addRow();
}

// INIT
window.onload=function(){
addRow();
addRow();
loadRecords();
}

</script>

</body>
</html>
