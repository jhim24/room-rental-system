<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
  position:relative;
  z-index:1000;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.updateBtn { background:#3498db;color:white; }
.editBtn { background:orange;color:white; }
.deleteBtn { background:red;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html?v=13'">📊 Dashboard</button>
<button onclick="location.href='rooms.html?v=13'">🏠 Rooms</button>
<button onclick="location.href='clients.html?v=13'">👥 Clients</button>
<button onclick="location.href='journal-voucher-entry.html?v=13'">📒 Journal</button>
<button onclick="location.href='coa.html?v=13'">📚 Chart of Accounts</button>
<button onclick="location.href='ledger.html?v=13'">📘 Client Ledger</button>
</div>
</div>

<div class="main">

<div class="box">
<h3>Journal Entry</h3>

<div class="formGrid">

<input type="date" id="date">

<select id="client"></select>

<select id="account"></select>

<input id="description" placeholder="Description">

<input type="number" id="debit" placeholder="Debit">

<input type="number" id="credit" placeholder="Credit">

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save</button>
<button class="updateBtn" onclick="updateEntry()">Update</button>

</div>

<div class="box">
<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Client</th>
<th>Account</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
<th>Action</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];

let editIndex = -1;

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select Client</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
client.innerHTML = html;
}

// LOAD COA
function loadCOA(){
let html = "<option value=''>Select Account</option>";
coa.forEach(a=>{
html += `<option value="${a.code} - ${a.name}">
${a.code} - ${a.name}
</option>`;
});
account.innerHTML = html;
}

// ADD
function addEntry(){

if(account.value === ""){
alert("Select account");
return;
}

entries.push({
date: date.value,
client: client.value,
account: account.value,
description: description.value,
debit: Number(debit.value) || 0,
credit: Number(credit.value) || 0
});

saveData();
}

// UPDATE
function updateEntry(){

if(editIndex === -1){
alert("Select record to edit");
return;
}

entries[editIndex] = {
date: date.value,
client: client.value,
account: account.value,
description: description.value,
debit: Number(debit.value) || 0,
credit: Number(credit.value) || 0
};

editIndex = -1;
saveData();
}

// EDIT
function editEntry(i){

let e = entries[i];

date.value = e.date;
client.value = e.client;
account.value = e.account;
description.value = e.description;
debit.value = e.debit;
credit.value = e.credit;

editIndex = i;
}

// DELETE
function deleteEntry(i){

if(confirm("Delete this entry?")){
entries.splice(i,1);
saveData();
}
}

// SAVE + RELOAD
function saveData(){
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
clearForm();
}

// LOAD TABLE
function loadTable(){

let html = "";

entries.forEach((e,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${e.date}</td>
<td>${e.client || ""}</td>
<td>${e.account}</td>
<td>${e.description}</td>
<td>${e.debit}</td>
<td>${e.credit}</td>
<td>
<button class="editBtn" onclick="editEntry(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button>
</td>
</tr>
`;
});

jvTable.innerHTML = html;
}

// CLEAR
function clearForm(){
description.value="";
debit.value="";
credit.value="";
}

// INIT
loadClients();
loadCOA();
loadTable();

</script>

</body>
</html>
