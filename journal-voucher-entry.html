<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns
    : 60px 150px 200px 150px 200px 120px 100px;
  gap:5px;
  margin-bottom:5px;
}

.grid input,.grid select{padding:6px;width:100%;}

.header{
  background:#2c3e50;
  color:white;
  font-weight:bold;
  text-align:center;
}

button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
.addBtn{background:#3498db;color:white;}
.saveBtn{background:#2ecc71;color:white;}
.delBtn{background:#e74c3c;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#3498db;color:white;}

.total{font-weight:bold;background:#f1f1f1;}
</style>
</head>

<body>

<div class="box">

<h3>📒 Journal Entry</h3>

<div class="grid header">
<div>D/C</div>
<div>Acc Code</div>
<div>Account Name</div>
<div>Client</div>
<div>Narration</div>
<div>Amount</div>
<div>Action</div>
</div>

<div id="rows"></div>

<button class="addBtn" onclick="addRow()">+ Add Row</button>
<button class="saveBtn" onclick="saveJournal()">Save</button>

</div>

<div class="box">

<h3>📋 Journal Records</h3>

<table>
<thead>
<tr>
<th>Sr No.</th>
<th>Account</th>
<th>Client</th>
<th>Narration</th>
<th>Cr</th>
<th>Dr</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

<tfoot>
<tr class="total">
<td colspan="4">TOTAL</td>
<td id="totalCr">0</td>
<td id="totalDr">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

// ===== STORAGE =====
function getAccounts(){
  return JSON.parse(localStorage.getItem("accounts")) || [];
}

function getClients(){

let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

return tenants.map((t,i)=>({
  id: "C" + String(i+1).padStart(3,"0"),
  name: t.name
}));

}

// ===== VARIABLES =====
let rowCount = 0;

// ===== ADD ROW =====
function addRow(){
rowCount++;

let div = document.createElement("div");
div.className="grid";
div.id="row"+rowCount;

div.innerHTML=`

<select id="dc${rowCount}">
<option>D</option>
<option>C</option>
</select>

<select id="accCode${rowCount}" onchange="fillAccount(${rowCount})"></select>

<input id="name${rowCount}" readonly>

<select id="sub${rowCount}" onchange="fillClient(${rowCount})"></select>

<input id="nar${rowCount}" placeholder="Narration">

<input id="amt${rowCount}" type="number">

<button class="delBtn" onclick="deleteRow(${rowCount})">X</button>
`;

document.getElementById("rows").appendChild(div);

loadAccountDropdown(rowCount);
loadClientDropdown(rowCount);
}

// ===== DELETE =====
function deleteRow(i){
let el = document.getElementById("row"+i);
if(el) el.remove();
}

// ===== LOAD ACCOUNTS =====
function loadAccountDropdown(row){

let accounts = getAccounts();
let select = document.getElementById("accCode"+row);

select.innerHTML = '<option value="">Select</option>';

accounts.forEach(acc=>{
select.innerHTML += `
<option value="${acc.code}" data-name="${acc.name}">
${acc.code} - ${acc.name}
</option>
`;
});
}

// ===== LOAD CLIENTS =====
function loadClientDropdown(row){

let clients = getClients();
let select = document.getElementById("sub"+row);

select.innerHTML = '<option value="">Select Client</option>';

clients.forEach(c=>{
select.innerHTML += `
<option value="${c.name}">
${c.id} - ${c.name}
</option>
`;
});
}

// ===== AUTO ACCOUNT NAME =====
function fillAccount(row){
let select = document.getElementById("accCode"+row);
let name = select.options[select.selectedIndex]?.dataset.name;
document.getElementById("name"+row).value = name || "";
}

// ===== AUTO CLIENT NAME (ALREADY IN VALUE) =====
function fillClient(row){
let select = document.getElementById("sub"+row);
let name = select.value;
}

// ===== SAVE =====
function saveJournal(){

let jv = JSON.parse(localStorage.getItem("jv")) || [];
let tenantLedger = JSON.parse(localStorage.getItem("tenantLedger")) || [];

for(let i=1;i<=rowCount;i++){

let dc = document.getElementById("dc"+i);
if(!dc) continue;

let acc = document.getElementById("name"+i).value;
let sub = document.getElementById("sub"+i).value;
let nar = document.getElementById("nar"+i).value;
let amt = parseFloat(document.getElementById("amt"+i).value) || 0;

if(!acc || amt<=0) continue;

// ===== SAVE JOURNAL =====
jv.push({
date:new Date().toISOString().split("T")[0],
acc,
sub,
nar,
amt,
dc:dc.value
});

// ===== TENANT LEDGER AUTO =====
if(sub){

tenantLedger.push({
date:new Date().toISOString().split("T")[0],
name: sub,
desc: nar,
debit: dc.value === "D" ? amt : 0,
credit: dc.value === "C" ? amt : 0
});

}

}

localStorage.setItem("jv", JSON.stringify(jv));
localStorage.setItem("tenantLedger", JSON.stringify(tenantLedger));

alert("✅ Saved & Ledger Updated!");
loadRecords();
}

// ===== LOAD RECORDS =====
function loadRecords(){

let jv = JSON.parse(localStorage.getItem("jv")) || [];

let html="";
let drTotal=0;
let crTotal=0;
let i=1;

jv.forEach(e=>{

let dr = e.dc==="D"?e.amt:"";
let cr = e.dc==="C"?e.amt:"";

if(e.dc==="D") drTotal+=e.amt;
if(e.dc==="C") crTotal+=e.amt;

html+=`
<tr>
<td>${i++}</td>
<td>${e.acc}</td>
<td>${e.sub || ""}</td>
<td>${e.nar}</td>
<td>${cr}</td>
<td>${dr}</td>
</tr>
`;
});

document.getElementById("recordTable").innerHTML = html;
document.getElementById("totalDr").innerText = drTotal;
document.getElementById("totalCr").innerText = crTotal;
}

// ===== INIT =====
window.onload=function(){
addRow();
loadRecords();
};

</script>

</body>
</html>
