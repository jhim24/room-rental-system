<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select{
  padding:8px;
  margin:5px;
  width:180px;
}

button{
  padding:8px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.saveBtn{background:#2ecc71;color:white;}
.clearBtn{background:#e74c3c;color:white;}
.backBtn{background:#34495e;color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<div class="box">

<h3>📒 Journal Entry</h3>

<!-- BACK BUTTON -->
<button class="backBtn" onclick="goBack()">⬅ Back</button>

<br><br>

<!-- DATE -->
<input type="date" id="date">

<br>

<!-- ACCOUNT DROPDOWN -->
<select id="accName">
  <option value="">Select Account</option>
  <option value="Accounts Receivable">Accounts Receivable</option>
  <option value="Cash">Cash</option>
  <option value="Revenue">Revenue</option>
</select>

<!-- SUB / CLIENT DROPDOWN -->
<select id="subName">
  <option value="">Select Client</option>
  <option value="Juan">Juan</option>
  <option value="Pedro">Pedro</option>
</select>

<br>

<input id="accCode" placeholder="Account Code">
<input id="subCode" placeholder="Sub Code">

<br>

<input id="debit" type="number" placeholder="Debit">
<input id="credit" type="number" placeholder="Credit">

<br>

<button class="saveBtn" onclick="saveJournal()">Save Entry</button>
<button class="clearBtn" onclick="clearJV()">Clear All</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Acc Code</th>
<th>Account</th>
<th>Sub Code</th>
<th>Client</th>
<th>Debit</th>
<th>Credit</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

<script>

// AUTO TODAY DATE
document.getElementById("date").valueAsDate = new Date();

// GET DATA
function getJV(){
  try{return JSON.parse(localStorage.getItem("jv"))||[];}
  catch{return [];}
}

// SAVE
function saveJournal(){

let date = document.getElementById("date").value;
let accName = document.getElementById("accName").value;
let subName = document.getElementById("subName").value;
let accCode = document.getElementById("accCode").value;
let subCode = document.getElementById("subCode").value;

let debit = parseFloat(document.getElementById("debit").value)||0;
let credit = parseFloat(document.getElementById("credit").value)||0;

if(!accName || !subName){
  alert("Select account & client");
  return;
}

if(debit<=0 && credit<=0){
  alert("Enter debit or credit");
  return;
}

// ✅ FIX LOGIC (IMPORTANT)
if(accName.toLowerCase().includes("receivable")){
  if(debit>0) credit=0;
  if(credit>0) debit=0;
}

let jv = getJV();

// SAVE DEBIT
if(debit>0){
  jv.push({
    date,
    accCode,
    acc:accName,
    subCode,
    sub:subName,
    amt:debit,
    dc:"D"
  });
}

// SAVE CREDIT
if(credit>0){
  jv.push({
    date,
    accCode,
    acc:accName,
    subCode,
    sub:subName,
    amt:credit,
    dc:"C"
  });
}

localStorage.setItem("jv", JSON.stringify(jv));

alert("✅ Saved!");

loadJV();

// CLEAR INPUT
document.getElementById("debit").value="";
document.getElementById("credit").value="";
}

// LOAD
function loadJV(){

let jv = getJV();
let html="";
let i=1;

jv.forEach(e=>{

let dr = e.dc==="D"?e.amt:"";
let cr = e.dc==="C"?e.amt:"";

html+=`
<tr>
<td>${i++}</td>
<td>${e.date||""}</td>
<td>${e.accCode||""}</td>
<td>${e.acc}</td>
<td>${e.subCode||""}</td>
<td>${e.sub}</td>
<td>${dr}</td>
<td>${cr}</td>
</tr>
`;
});

jvTable.innerHTML = html || "<tr><td colspan='8'>No data</td></tr>";
}

// CLEAR
function clearJV(){
if(confirm("Clear all?")){
localStorage.removeItem("jv");
loadJV();
}
}

// BACK BUTTON
function goBack(){
  window.history.back();
}

window.onload = loadJV;

</script>

</body>
</html>
