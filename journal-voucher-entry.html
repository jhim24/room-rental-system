<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
  position:relative;
  z-index:1000;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  position:relative;
  z-index:1001;
}

.menu button:hover {
  background:#3498db;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

/* GRID */
.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%;
  box-sizing:border-box;
}

/* BUTTON */
.saveBtn {
  padding:10px;
  background:#2ecc71;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">

<button onclick="location.href='index.html?v=12'">
📊 Dashboard
</button>

<button onclick="location.href='rooms.html?v=12'">
🏠 Rooms
</button>

<button onclick="location.href='clients.html?v=12'">
👥 Clients
</button>

<button onclick="location.href='journal-voucher-entry.html?v=12'">
📒 Journal
</button>

<button onclick="location.href='coa.html?v=12'">
📚 Chart of Accounts
</button>

<button onclick="location.href='ledger.html?v=12'">
📘 Client Ledger
</button>

</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="box">
<h3>Journal Entry</h3>

<div class="formGrid">

<input type="date" id="date">

<!-- 🔥 CLIENT (SUB-CODE) -->
<select id="client"></select>

<!-- 🔥 ACCOUNT (COA) -->
<select id="account"></select>

<input id="description" placeholder="Description">

<input type="number" id="debit" placeholder="Debit">

<input type="number" id="credit" placeholder="Credit">

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save</button>

</div>

<div class="box">
<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Client</th>
<th>Account</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

</div>

<script>

// 🔥 DATA
let entries = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];

// 🔥 LOAD CLIENTS (SUB-CODE)
function loadClients(){

let html = "<option value=''>Select Client</option>";

clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});

document.getElementById("client").innerHTML = html;
}

// 🔥 LOAD COA
function loadCOA(){

let html = "<option value=''>Select Account</option>";

coa.forEach(a=>{
html += `<option value="${a.code} - ${a.name}">
${a.code} - ${a.name}
</option>`;
});

document.getElementById("account").innerHTML = html;
}

// 🔥 ADD ENTRY
function addEntry(){

let d = document.getElementById("date").value;
let client = document.getElementById("client").value;
let acc = document.getElementById("account").value;
let desc = document.getElementById("description").value;
let debit = Number(document.getElementById("debit").value) || 0;
let credit = Number(document.getElementById("credit").value) || 0;

if(acc === ""){
alert("Select account");
return;
}

entries.push({
date:d,
client:client,
account:acc,
description:desc,
debit:debit,
credit:credit
});

localStorage.setItem("jv", JSON.stringify(entries));

loadTable();
clearForm();
}

// 🔥 LOAD TABLE
function loadTable(){

let html = "";

entries.forEach((e,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${e.date || ""}</td>
<td>${e.client || ""}</td>
<td>${e.account}</td>
<td>${e.description}</td>
<td>${e.debit}</td>
<td>${e.credit}</td>
</tr>
`;
});

document.getElementById("jvTable").innerHTML = html;
}

// 🔥 CLEAR
function clearForm(){
document.getElementById("description").value="";
document.getElementById("debit").value="";
document.getElementById("credit").value="";
}

// 🔥 INIT
loadClients();
loadCOA();
loadTable();

</script>

</body>
</html>
