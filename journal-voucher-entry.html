<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.editBtn { background:orange;color:white; }
.deleteBtn { background:red;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html?v=15'">📊 Dashboard</button>
<button onclick="location.href='rooms.html?v=15'">🏠 Rooms</button>
<button onclick="location.href='clients.html?v=15'">👥 Clients</button>
<button onclick="location.href='journal-voucher-entry.html?v=15'">📒 Journal</button>
<button onclick="location.href='coa.html?v=15'">📚 Chart of Accounts</button>
<button onclick="location.href='ledger.html?v=15'">📘 Client Ledger</button>
</div>
</div>

<div class="main">

<div class="box">
<h3>Journal Entry (Manual)</h3>

<div class="formGrid">

<input type="date" id="date">

<select id="client"></select>

<select id="account"></select>

<input id="description" placeholder="Description">

<input type="number" id="debit" placeholder="Debit">

<input type="number" id="credit" placeholder="Credit">

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Add Entry</button>

</div>

<div class="box">
<h3>Journal Records (Grouped)</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Client</th>
<th>Description</th>
<th>Total Debit</th>
<th>Total Credit</th>
<th>Action</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

</div>

<script>

// DATA
let entries = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select Client</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
client.innerHTML = html;
}

// LOAD COA
function loadCOA(){
let html = "<option value=''>Select Account</option>";
coa.forEach(a=>{
html += `<option value="${a.code} - ${a.name}">
${a.code} - ${a.name}
</option>`;
});
account.innerHTML = html;
}

// ADD ENTRY (WITH GROUP)
function addEntry(){

let d = date.value;
let clientVal = client.value;
let acc = account.value;
let desc = description.value;
let debit = Number(document.getElementById("debit").value) || 0;
let credit = Number(document.getElementById("credit").value) || 0;

if(clientVal === "" || acc === ""){
alert("Fill required fields");
return;
}

if(debit === 0 && credit === 0){
alert("Enter debit or credit");
return;
}

// 🔥 GROUP ID
let groupId = Date.now();

entries.push({
group:groupId,
date:d,
client:clientVal,
account:acc,
description:desc,
debit:debit,
credit:credit
});

localStorage.setItem("jv", JSON.stringify(entries));

loadTable();
clearForm();
}

// DELETE GROUP
function deleteGroup(groupId){

if(confirm("Delete this transaction?")){
entries = entries.filter(e => e.group !== groupId);
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}
}

// LOAD TABLE (GROUPED)
function loadTable(){

let grouped = {};

// GROUP
entries.forEach(e=>{
if(!grouped[e.group]){
grouped[e.group] = {
date:e.date,
client:e.client,
description:e.description,
debit:0,
credit:0,
group:e.group
};
}

grouped[e.group].debit += e.debit;
grouped[e.group].credit += e.credit;
});

let html = "";
let i = 1;

Object.values(grouped).forEach(g=>{
html += `
<tr>
<td>${i++}</td>
<td>${g.date}</td>
<td>${g.client}</td>
<td>${g.description}</td>
<td>${g.debit}</td>
<td>${g.credit}</td>
<td>
<button class="deleteBtn" onclick="deleteGroup(${g.group})">Delete</button>
</td>
</tr>
`;
});

jvTable.innerHTML = html;
}

// CLEAR
function clearForm(){
description.value="";
debit.value="";
credit.value="";
}

// INIT
loadClients();
loadCOA();
loadTable();

</script>

</body>
</html>
