<!DOCTYPE html>
<html>
<head>
<title>Client Ledger</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, select {
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.printBtn { background:#2ecc71;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#3498db;
  color:white;
}

.totalBox {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html?v=20'">📊 Dashboard</button>
<button onclick="location.href='rooms.html?v=20'">🏠 Rooms</button>
<button onclick="location.href='clients.html?v=20'">👥 Clients</button>
<button onclick="location.href='journal-voucher-entry.html?v=20'">📒 Journal</button>
<button onclick="location.href='coa.html?v=20'">📚 Chart of Accounts</button>
<button onclick="location.href='ledger.html?v=20'">📘 Client Ledger</button>
</div>
</div>

<div class="main">

<div class="box">
<h2>Client Ledger</h2>

<select id="client"></select>

<br>

From: <input type="date" id="from">
To: <input type="date" id="to">

<br><br>

<button class="printBtn" onclick="printLedger()">🖨 Print Ledger</button>

</div>

<div class="box">

<h3>Ledger Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
<th>Running Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>

<div class="totalBox">
Total Balance: <span id="totalBalance">0</span><br>
Unpaid Months: <span id="unpaidMonths">0</span>
</div>

</div>

</div>

<script>

let clients = JSON.parse(localStorage.getItem("tenants")) || [];
let entries = JSON.parse(localStorage.getItem("jv")) || [];

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select Client</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
document.getElementById("client").innerHTML = html;
}

// LOAD LEDGER (FIXED)
function loadLedger(){

let selectedClient = document.getElementById("client").value;
let from = document.getElementById("from").value;
let to = document.getElementById("to").value;

let html = "";
let balance = 0;
let unpaidMonths = 0;

// SORT BY DATE
let sorted = entries.sort((a,b)=> new Date(a.date) - new Date(b.date));

sorted.forEach((e,i)=>{

if(e.client !== selectedClient) return;

if(from && e.date < from) return;
if(to && e.date > to) return;

// 🔥 ONLY ACCOUNTS RECEIVABLE
if(!e.account.includes("Accounts Receivable")) return;

// COMPUTE BALANCE
balance += e.debit;
balance -= e.credit;

// COUNT UNPAID (DEBIT ONLY)
if(e.debit > 0) unpaidMonths++;

html += `
<tr>
<td>${i+1}</td>
<td>${e.date}</td>
<td>${e.description}</td>
<td>${e.debit}</td>
<td>${e.credit}</td>
<td style="color:${balance>0?'red':'green'}">${balance}</td>
</tr>
`;

});

document.getElementById("ledgerTable").innerHTML = html;
document.getElementById("totalBalance").innerText = balance;
document.getElementById("unpaidMonths").innerText = unpaidMonths;

}

// PRINT
function printLedger(){
window.print();
}

// EVENTS
document.getElementById("client").addEventListener("change", loadLedger);
document.getElementById("from").addEventListener("change", loadLedger);
document.getElementById("to").addEventListener("change", loadLedger);

// INIT
loadClients();

</script>

</body>
</html>
