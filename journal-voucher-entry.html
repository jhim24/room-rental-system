<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns:60px 140px 180px 180px 180px 100px 80px;
  gap:5px;
  margin-bottom:5px;
}

.grid input,.grid select{padding:6px;width:100%;}

.header{
  background:#2c3e50;
  color:white;
  font-weight:bold;
  text-align:center;
}

button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
.addBtn{background:#3498db;color:white;}
.saveBtn{background:#2ecc71;color:white;}
.delBtn{background:#e74c3c;color:white;}
.editBtn{background:#f39c12;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#3498db;color:white;}

.total{font-weight:bold;background:#f1f1f1;}
</style>
</head>

<body>

<div class="box">

<h3>📒 Journal Entry</h3>

<div class="grid header">
<div>D/C</div>
<div>Code</div>
<div>Account</div>
<div>Client</div>
<div>Narration</div>
<div>Amount</div>
<div>Action</div>
</div>

<div id="rows"></div>

<button class="addBtn" onclick="addRow()">+ Add Row</button>
<button class="saveBtn" onclick="saveJournal()">Save</button>

</div>

<div class="box">

<h3>📋 Journal Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Account</th>
<th>Client</th>
<th>Narration</th>
<th>Cr</th>
<th>Dr</th>
<th>Action</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

<tfoot>
<tr class="total">
<td colspan="4">TOTAL</td>
<td id="totalCr">0</td>
<td id="totalDr">0</td>
<td></td>
</tr>
</tfoot>

</table>

</div>

<script>

// ===== INIT DEFAULT ACCOUNTS =====
function initAccounts(){
let acc = JSON.parse(localStorage.getItem("accounts"));
if(!acc){
let data=[
{code:"1000",name:"Cash"},
{code:"1100",name:"Accounts Receivable"},
{code:"4000",name:"Rent Income"}
];
localStorage.setItem("accounts",JSON.stringify(data));
}
}

// ===== STORAGE =====
function getAccounts(){
return JSON.parse(localStorage.getItem("accounts")) || [];
}
function getTenants(){
return JSON.parse(localStorage.getItem("tenants")) || [];
}
function getJV(){
return JSON.parse(localStorage.getItem("jv")) || [];
}
function saveJV(data){
localStorage.setItem("jv",JSON.stringify(data));
}

// ===== ADD ROW =====
function addRow(){

let div=document.createElement("div");
div.className="grid";

div.innerHTML=`
<select>
<option>D</option>
<option>C</option>
</select>

<select onchange="fillAcc(this)"></select>

<input readonly>

<select></select>

<input placeholder="Narration">

<input type="number">

<button class="delBtn" onclick="this.parentElement.remove()">X</button>
`;

rows.appendChild(div);

// LOAD ACCOUNTS
let accSel = div.children[1];
getAccounts().forEach(a=>{
accSel.innerHTML+=`<option value="${a.code}" data-name="${a.name}">
${a.code} - ${a.name}</option>`;
});

// LOAD CLIENTS
let clientSel = div.children[3];
clientSel.innerHTML='<option value="">Client</option>';
getTenants().forEach(t=>{
clientSel.innerHTML+=`<option value="${t.name}">${t.name}</option>`;
});
}

// ===== AUTO ACCOUNT =====
function fillAcc(el){
let name = el.options[el.selectedIndex]?.dataset.name;
el.parentElement.children[2].value = name || "";
}

// ===== SAVE =====
function saveJournal(){

let jv = getJV();
let rowsList = document.querySelectorAll("#rows .grid");

let entry=[];

rowsList.forEach(r=>{

let dc = r.children[0].value;
let code = r.children[1].value;
let acc = r.children[2].value;
let sub = r.children[3].value;
let nar = r.children[4].value;
let amt = Number(r.children[5].value);

if(!code || !acc || amt<=0) return;

// only AR may client
if(!acc.toLowerCase().includes("receivable")){
sub="";
}

entry.push({dc,code,acc,sub,nar,amt});

});

if(entry.length===0){
alert("❌ Fill Account & Amount first");
return;
}

jv.push(entry);
saveJV(jv);

loadRecords();
rows.innerHTML="";
addRow();
addRow();

alert("✅ Saved!");
}

// ===== LOAD =====
function loadRecords(){

let jv=getJV();
let html="";
let dr=0,cr=0;

jv.forEach((entry,i)=>{

entry.forEach(e=>{

let d=e.dc==="D"?e.amt:"";
let c=e.dc==="C"?e.amt:"";

if(d) dr+=e.amt;
if(c) cr+=e.amt;

html+=`
<tr>
<td>${i+1}</td>
<td>${e.acc}</td>
<td>${e.sub||""}</td>
<td>${e.nar||""}</td>
<td>${c}</td>
<td>${d}</td>
<td>
<button class="editBtn" onclick="edit(${i})">Edit</button>
<button class="delBtn" onclick="del(${i})">Delete</button>
</td>
</tr>`;
});

});

recordTable.innerHTML=html;
totalCr.innerText=cr;
totalDr.innerText=dr;
}

// ===== DELETE =====
function del(i){
let jv=getJV();
if(confirm("Delete?")){
jv.splice(i,1);
saveJV(jv);
loadRecords();
}
}

// ===== EDIT =====
function edit(i){

let jv=getJV();
let entry=jv[i];

rows.innerHTML="";

entry.forEach(e=>{
addRow();
let r = rows.lastElementChild.children;

r[0].value=e.dc;
r[1].value=e.code;
fillAcc(r[1]);
r[3].value=e.sub;
r[4].value=e.nar;
r[5].value=e.amt;
});

jv.splice(i,1);
saveJV(jv);
loadRecords();
}

// INIT
window.onload=function(){
initAccounts();
addRow();
addRow();
loadRecords();
}

</script>

</body>
</html>
