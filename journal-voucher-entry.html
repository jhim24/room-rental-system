<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%;
}

button {
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.updateBtn { background:#3498db;color:white; }
.editBtn { background:orange;color:white; }
.deleteBtn { background:red;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html?v=22'">📊 Dashboard</button>
<button onclick="location.href='rooms.html?v=22'">🏠 Rooms</button>
<button onclick="location.href='clients.html?v=22'">👥 Clients</button>
<button onclick="location.href='journal-voucher-entry.html?v=22'">📒 Journal</button>
<button onclick="location.href='coa.html?v=22'">📚 Chart of Accounts</button>
<button onclick="location.href='ledger.html?v=22'">📘 Client Ledger</button>
</div>
</div>

<div class="main">

<div class="box">
<h3>Journal Entry</h3>

<div class="formGrid">
<input type="date" id="date">
<select id="client"></select>
<select id="account"></select>

<input id="description" placeholder="Description">
<input type="number" id="debit" placeholder="Debit">
<input type="number" id="credit" placeholder="Credit">
</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save</button>
<button class="updateBtn" onclick="updateEntry()">Update</button>

</div>

<div class="box">
<h3>Filter</h3>
<select id="filterClient" onchange="loadTable()"></select>
</div>

<div class="box">
<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Account (with Sub-code)</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
<th>Action</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];

let editIndex = -1;

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select Client</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
client.innerHTML = html;
filterClient.innerHTML = "<option value=''>All Clients</option>" + html;
}

// LOAD COA
function loadCOA(){
let html = "<option value=''>Select Account</option>";
coa.forEach(a=>{
html += `<option value="${a.code} - ${a.name}">
${a.code} - ${a.name}
</option>`;
});
account.innerHTML = html;
}

// ADD ENTRY
function addEntry(){

let d = date.value;
let c = client.value;
let a = account.value;
let desc = description.value;
let debitVal = Number(debit.value) || 0;
let creditVal = Number(credit.value) || 0;

if(!a){
alert("Select account");
return;
}

if(debitVal === 0 && creditVal === 0){
alert("Enter debit or credit");
return;
}

// 🔥 CLIENT ONLY FOR AR
let accLower = a.toLowerCase();

if(
  !accLower.includes("receivable") &&
  !accLower.includes("a/r") &&
  !accLower.includes("ar")
){
  c = "";
}

entries.push({
date:d,
client:c,
account:a,
description:desc,
debit:debitVal,
credit:creditVal
});

saveData();
}

// EDIT
function editEntry(i){
let e = entries[i];

date.value = e.date;
client.value = e.client;
account.value = e.account;
description.value = e.description;
debit.value = e.debit;
credit.value = e.credit;

editIndex = i;
}

// UPDATE
function updateEntry(){

if(editIndex === -1){
alert("Select entry first");
return;
}

let a = account.value;
let c = client.value;

let accLower = a.toLowerCase();

if(
  !accLower.includes("receivable") &&
  !accLower.includes("a/r") &&
  !accLower.includes("ar")
){
  c = "";
}

entries[editIndex] = {
date: date.value,
client: c,
account: a,
description: description.value,
debit: Number(debit.value) || 0,
credit: Number(credit.value) || 0
};

editIndex = -1;
saveData();
}

// DELETE
function deleteEntry(i){
if(confirm("Delete this entry?")){
entries.splice(i,1);
saveData();
}
}

// SAVE
function saveData(){
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
clearForm();
}

// LOAD TABLE (WITH SUB-CODE DISPLAY)
function loadTable(){

let filter = filterClient.value;
let html = "";

entries.forEach((e,i)=>{

if(filter && e.client !== filter) return;

// 🔥 DISPLAY SUB-CODE
let accountDisplay = e.account;
if(e.client){
accountDisplay += " - " + e.client;
}

html += `
<tr>
<td>${i+1}</td>
<td>${e.date}</td>
<td>${accountDisplay}</td>
<td>${e.description}</td>
<td>${e.debit}</td>
<td>${e.credit}</td>
<td>
<button class="editBtn" onclick="editEntry(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button>
</td>
</tr>
`;
});

jvTable.innerHTML = html;
}

// CLEAR
function clearForm(){
description.value="";
debit.value="";
credit.value="";
}

// INIT
loadClients();
loadCOA();
loadTable();

</script>

</body>
</html>
