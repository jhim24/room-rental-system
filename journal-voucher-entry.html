<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.container { padding:20px; }

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }
.backBtn { background:#34495e;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }

.summary {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<button class="backBtn" onclick="history.back()">⬅ Back</button>

<div class="box">
<h3>Journal Entry</h3>

<input type="date" id="date">

<br><br>

<div class="grid">

<!-- ROW 1 -->
<select id="dc1"><option>D</option><option>C</option></select>
<select id="code1" onchange="autoFillAccount(1)"></select>
<input id="accountName1" readonly>
<input id="amount1" type="number" placeholder="Amount">
<select id="subName1"></select>

<!-- ROW 2 -->
<select id="dc2"><option>D</option><option>C</option></select>
<select id="code2" onchange="autoFillAccount(2)"></select>
<input id="accountName2" readonly>
<input id="amount2" type="number" placeholder="Amount">
<select id="subName2"></select>

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save</button>

</div>

<div class="box">

<h3>Journal Records</h3>

<div class="summary">
<div id="totalDebit">Total Debit: 0</div>
<div id="totalCredit">Total Credit: 0</div>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>D/C</th>
<th>Code</th>
<th>Account</th>
<th>Sub</th>
<th>Amount</th>
<th>ADD</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];

// LOAD COA
function loadCOA(){
let html = "<option value=''>Select</option>";
coa.forEach(a=>{
html += `<option value="${a.code}" data-name="${a.name}">
${a.code} - ${a.name}
</option>`;
});
document.getElementById("code1").innerHTML = html;
document.getElementById("code2").innerHTML = html;
}

// AUTO ACCOUNT NAME
function autoFillAccount(row){
let select = document.getElementById("code"+row);
let selected = select.options[select.selectedIndex];
let name = selected.getAttribute("data-name");
document.getElementById("accountName"+row).value = name || "";
}

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
document.getElementById("subName1").innerHTML = html;
document.getElementById("subName2").innerHTML = html;
}

// ADD ENTRY
function addEntry(){

let d = document.getElementById("date").value;

if(!d){
alert("Select date");
return;
}

[1,2].forEach(r=>{

let dc = document.getElementById("dc"+r).value;
let code = document.getElementById("code"+r).value;
let acc = document.getElementById("accountName"+r).value;
let amt = Number(document.getElementById("amount"+r).value);
let sub = document.getElementById("subName"+r).value;

if(!code || amt <= 0) return;

// AR only may client
if(code !== "1100") sub = "";

entries.push({
date:d,
dc:dc,
code:code,
account:acc,
amount:amt,
sub:sub
});

});

localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
clearForm();
}

// LOAD TABLE (FULL FIXED)
function loadTable(){

let html = "";
let totalD = 0;
let totalC = 0;

entries.forEach((e,i)=>{

if(e.dc === "D") totalD += e.amount;
if(e.dc === "C") totalC += e.amount;

// AR EFFECT ONLY
let add = "-";
if(e.code === "1100"){
add = e.dc === "D" ? "+" + e.amount : "-" + e.amount;
}

let formattedDate = new Date(e.date).toLocaleDateString('en-GB');

html += `
<tr>
<td>${formattedDate}</td>
<td>${e.dc}</td>
<td>${e.code}</td>
<td>${e.account}</td>
<td>${e.sub || ""}</td>
<td>${e.amount}</td>
<td>${add}</td>
<td><button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button></td>
</tr>
`;

});

document.getElementById("table").innerHTML = html;

document.getElementById("totalDebit").innerText = "Total Debit: " + totalD;
document.getElementById("totalCredit").innerText = "Total Credit: " + totalC;
}

// DELETE
function deleteEntry(i){
entries.splice(i,1);
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}

// CLEAR
function clearForm(){
document.getElementById("amount1").value = "";
document.getElementById("amount2").value = "";
}

// INIT
loadCOA();
loadClients();
loadTable();

</script>

</body>
</html>
