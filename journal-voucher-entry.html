<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html?v=7'">📊 Dashboard</button>
<button onclick="location.href='rooms.html?v=7'">🏠 Rooms</button>
<button onclick="location.href='clients.html?v=7'">👥 Clients</button>
<button onclick="location.href='journal-voucher-entry.html?v=7'">📒 Journal</button>
<button onclick="location.href='coa.html?v=7'">📚 Chart of Accounts</button>
</div>
</div>

<div class="main">

<div class="box">
<h3>Journal Entry</h3>

<div class="formGrid">

<input type="date" id="date">

<select id="account"></select>

<input id="description" placeholder="Description">

<input type="number" id="debit" placeholder="Debit">

<input type="number" id="credit" placeholder="Credit">

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save</button>

</div>

<div class="box">
<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Account</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
</tr>
</thead>

<tbody id="jvTable"></tbody>

</table>

</div>

</div>

<script>

// 🔥 SAFE LOAD
let entries = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];

// 🔥 LOAD COA (FIXED)
function loadCOA(){

let acc = document.getElementById("account");

let html = "<option value=''>Select Account</option>";

coa.forEach(a=>{
html += `<option value="${a.code} - ${a.name}">
${a.code} - ${a.name}
</option>`;
});

acc.innerHTML = html;
}

// 🔥 ADD ENTRY (FIXED)
function addEntry(){

let d = document.getElementById("date").value;
let acc = document.getElementById("account").value;
let desc = document.getElementById("description").value;
let debit = Number(document.getElementById("debit").value) || 0;
let credit = Number(document.getElementById("credit").value) || 0;

if(acc === ""){
alert("Select account");
return;
}

entries.push({
date:d,
account:acc,
description:desc,
debit:debit,
credit:credit
});

localStorage.setItem("jv", JSON.stringify(entries));

loadTable();
clearForm();
}

// 🔥 LOAD TABLE (FAST)
function loadTable(){

let html = "";

entries.forEach((e,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${e.date || ""}</td>
<td>${e.account}</td>
<td>${e.description}</td>
<td>${e.debit}</td>
<td>${e.credit}</td>
</tr>
`;
});

document.getElementById("jvTable").innerHTML = html;
}

// 🔥 CLEAR FORM
function clearForm(){
document.getElementById("description").value="";
document.getElementById("debit").value="";
document.getElementById("credit").value="";
}

// 🔥 INIT
loadCOA();
loadTable();

</script>

</body>
</html>
