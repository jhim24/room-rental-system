<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.container { padding:20px; }

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.formRow {
  display:grid;
  grid-template-columns: 80px 150px 1fr 120px 120px;
  gap:10px;
  margin-bottom:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  width:100%;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }

.summary {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h3>Journal Entry</h3>

<input type="date" id="date">
<input id="narration" placeholder="Narration">

<br><br>

<div class="formRow">
<b>D/C</b><b>Code</b><b>Account</b><b>Amount</b><b>Client</b>
</div>

<div class="formRow">
<select id="dc1"><option>D</option><option>C</option></select>
<select id="code1" onchange="autoFill(1)"></select>
<input id="name1" readonly>
<input id="amt1" type="number">
<select id="sub1"></select>
</div>

<div class="formRow">
<select id="dc2"><option>D</option><option>C</option></select>
<select id="code2" onchange="autoFill(2)"></select>
<input id="name2" readonly>
<input id="amt2" type="number">
<select id="sub2"></select>
</div>

<br>
<button class="saveBtn" onclick="save()">Save</button>

</div>

<div class="box">

<div class="summary">
<div id="dr">Dr: 0</div>
<div id="cr">Cr: 0</div>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Code</th>
<th>Account</th>
<th>Narration</th>
<th>Dr</th>
<th>Cr</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

<tfoot>
<tr>
<td colspan="4"><b>TOTAL</b></td>
<td id="tdr">0</td>
<td id="tcr">0</td>
</tr>
</tfoot>

</table>

</div>

</div>

<script>

let jv = JSON.parse(localStorage.getItem("jv")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

function loadCOA(){
let h="<option></option>";
coa.forEach(a=>{
h+=`<option value="${a.code}" data-name="${a.name}">${a.code}</option>`;
});
code1.innerHTML=h;
code2.innerHTML=h;
}

function autoFill(r){
let s=document.getElementById("code"+r);
let name=s.options[s.selectedIndex].getAttribute("data-name");
document.getElementById("name"+r).value=name||"";
}

function loadClients(){
let h="<option></option>";
tenants.forEach(t=>{
h+=`<option value="${t.name}">${t.name}</option>`;
});
sub1.innerHTML=h;
sub2.innerHTML=h;
}

function save(){

let date=dateInput.value;
if(!date) return alert("Select date");

[1,2].forEach(r=>{
let dc=document.getElementById("dc"+r).value;
let code=document.getElementById("code"+r).value;
let acc=document.getElementById("name"+r).value;
let amt=Number(document.getElementById("amt"+r).value);
let sub=document.getElementById("sub"+r).value;

if(!code||amt<=0) return;

if(code!="1100") sub="";

jv.push({
date,
dc,
code,
acc,
amt,
sub,
nar:narration.value
});
});

localStorage.setItem("jv",JSON.stringify(jv));
load();
}

function load(){

let h="";
let dr=0,cr=0;

jv.forEach((e,i)=>{

let d=e.dc=="D"?e.amt:"";
let c=e.dc=="C"?e.amt:"";

if(d) dr+=e.amt;
if(c) cr+=e.amt;

h+=`
<tr>
<td>${i+1}</td>
<td>${e.code}</td>
<td>${e.acc}${e.sub?"-"+e.sub:""}</td>
<td>${e.nar||""}</td>
<td>${d}</td>
<td>${c}</td>
</tr>`;
});

tbl.innerHTML=h;
tdr.innerText=dr;
tcr.innerText=cr;
drEl.innerText="Dr: "+dr;
crEl.innerText="Cr: "+cr;
}

let dateInput=document.getElementById("date");
let drEl=document.getElementById("dr");
let crEl=document.getElementById("cr");

loadCOA();
loadClients();
load();

</script>

</body>
</html>
