<!DOCTYPE html>
<html>
<head>
<title>Journal Entry</title>

<style>
body{font-family:Arial;background:#eef3ff;padding:20px;}
.box{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns
    : 60px 150px 200px 150px 200px 120px 100px;
  gap:5px;
  margin-bottom:5px;
}

.grid input,.grid select{padding:6px;width:100%;}

.header{
  background:#2c3e50;
  color:white;
  font-weight:bold;
  text-align:center;
}

button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;}
.addBtn{background:#3498db;color:white;}
.saveBtn{background:#2ecc71;color:white;}
.delBtn{background:#e74c3c;color:white;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#3498db;color:white;}

.total{font-weight:bold;background:#f1f1f1;}
</style>
</head>

<body>

<div class="box">

<h3>📒 Journal Entry</h3>

<div class="grid header">
<div>D/C</div>
<div>Acc Code</div>
<div>Account Name</div>
<div>Client</div>
<div>Narration</div>
<div>Amount</div>
<div>Action</div>
</div>

<div id="rows"></div>

<button class="addBtn" onclick="addRow()">+ Add Row</button>
<button class="saveBtn" onclick="saveJournal()">Save</button>

</div>

<div class="box">

<h3>📋 Journal Records</h3>

<table>
<thead>
<tr>
<th>Sr No.</th>
<th>Account</th>
<th>Client</th>
<th>Narration</th>
<th>Cr</th>
<th>Dr</th>
</tr>
</thead>

<tbody id="recordTable"></tbody>

<tfoot>
<tr class="total">
<td colspan="4">TOTAL</td>
<td id="totalCr">0</td>
<td id="totalDr">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

// ===== STORAGE =====
<script>

// ===== STORAGE =====
function getAccounts(){
  return JSON.parse(localStorage.getItem("accounts")) || [];
}

function getClients(){
  let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
  return tenants.map((t,i)=>({
    id: "C" + String(i+1).padStart(3,"0"),
    name: t.name
  }));
}

function getJV(){
  return JSON.parse(localStorage.getItem("jv")) || [];
}

function saveJV(data){
  localStorage.setItem("jv", JSON.stringify(data));
}

// ===== VARIABLES =====
let rowCount = 0;

// ===== ADD ROW =====
function addRow(){
rowCount++;

let div = document.createElement("div");
div.className="grid";
div.id="row"+rowCount;

div.innerHTML=`

<select id="dc${rowCount}">
<option>D</option>
<option>C</option>
</select>

<select id="accCode${rowCount}" onchange="fillAccount(${rowCount})"></select>

<input id="name${rowCount}" readonly>

<select id="sub${rowCount}"></select>

<input id="nar${rowCount}" placeholder="Narration">

<input id="amt${rowCount}" type="number">

<button class="delBtn" onclick="deleteRow(${rowCount})">X</button>
`;

document.getElementById("rows").appendChild(div);

loadAccountDropdown(rowCount);
loadClientDropdown(rowCount);
}

// ===== DELETE ROW =====
function deleteRow(i){
let el = document.getElementById("row"+i);
if(el) el.remove();
}

// ===== LOAD ACCOUNTS =====
function loadAccountDropdown(row){
let accounts = getAccounts();
let select = document.getElementById("accCode"+row);

select.innerHTML = '<option value="">Select</option>';

accounts.forEach(acc=>{
select.innerHTML += `
<option value="${acc.code}" data-name="${acc.name}">
${acc.code} - ${acc.name}
</option>`;
});
}

// ===== LOAD CLIENTS =====
function loadClientDropdown(row){
let clients = getClients();
let select = document.getElementById("sub"+row);

select.innerHTML = '<option value="">Select Client</option>';

clients.forEach(c=>{
select.innerHTML += `
<option value="${c.name}">
${c.id} - ${c.name}
</option>`;
});
}

// ===== AUTO ACCOUNT =====
function fillAccount(row){
let s=document.getElementById("accCode"+row);
let name=s.options[s.selectedIndex]?.dataset.name;
document.getElementById("name"+row).value=name||"";
}

// ===== SAVE =====
function saveJournal(){

let jv = getJV();

// LOOP ALL ROWS
for(let i=1;i<=rowCount;i++){

let dc=document.getElementById("dc"+i)?.value;
let code=document.getElementById("accCode"+i)?.value;
let acc=document.getElementById("name"+i)?.value;
let sub=document.getElementById("sub"+i)?.value;
let nar=document.getElementById("nar"+i)?.value;
let amt=Number(document.getElementById("amt"+i)?.value);

if(!code || !acc || !amt) continue;

// ONLY AR may client
if(!(acc||"").toLowerCase().includes("receivable")){
sub="";
}

jv.push({
dc, code, acc,
sub:(sub||"").trim(),
nar,
amt
});

}

saveJV(jv);
loadRecords();
alert("Saved!");
}

// ===== LOAD TABLE =====
function loadRecords(){

let jv = getJV();

let html="";
let dr=0, cr=0;

jv.forEach((e,i)=>{

let d = e.dc==="D" ? e.amt : "";
let c = e.dc==="C" ? e.amt : "";

if(d) dr+=e.amt;
if(c) cr+=e.amt;

html+=`
<tr>
<td>${i+1}</td>
<td>${e.acc}</td>
<td>${e.sub||""}</td>
<td>${e.nar||""}</td>
<td>${c}</td>
<td>${d}</td>
</tr>`;
});

document.getElementById("recordTable").innerHTML = html;
document.getElementById("totalCr").innerText = cr;
document.getElementById("totalDr").innerText = dr;
}

// INIT
window.onload = function(){
addRow();
addRow();
loadRecords();
}

</script>
</body>
</html>
