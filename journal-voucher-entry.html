<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
  color:#333;
}

.container {
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="container">

<div class="box">
<h3>Journal Entry</h3>

<div class="grid">

<select id="dc">
<option value="D">Debit</option>
<option value="C">Credit</option>
</select>

<input id="code" placeholder="Code (1100)">
<input id="accountName" placeholder="Account Name">

<select id="subDesc">
<option value="">None</option>
<option value="Tenant">Tenant</option>
<option value="Client">Client</option>
</select>

<input type="number" id="amount" placeholder="Amount">

<select id="subName"></select>

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Add Entry</button>

</div>

<div class="box">

<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>D/C</th>
<th>Code</th>
<th>Account Name</th>
<th>Sub Desc</th>
<th>Amount</th>
<th>Sub Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
subName.innerHTML = html;
}

// ADD ENTRY
function addEntry(){

let dc = dc.value;
let code = document.getElementById("code").value;
let acc = accountName.value;
let subDescVal = subDesc.value;
let amountVal = Number(amount.value);
let sub = subName.value;

// 🔥 RULE: only AR can have sub
if(code !== "1100"){
sub = "";
subDescVal = "";
}

entries.push({
dc:dc,
code:code,
account:acc,
subDesc:subDescVal,
amount:amountVal,
subName:sub
});

localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}

// LOAD TABLE
function loadTable(){

let html = "";

entries.forEach((e,i)=>{

html += `
<tr>
<td>${e.dc}</td>
<td>${e.code}</td>
<td>${e.account}</td>
<td>${e.subDesc}</td>
<td>${e.amount}</td>
<td>${e.subName}</td>
<td>
<button onclick="deleteEntry(${i})">Delete</button>
</td>
</tr>
`;

});

table.innerHTML = html;
}

// DELETE
function deleteEntry(i){
entries.splice(i,1);
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}

// INIT
loadClients();
loadTable();

</script>

</body>
</html>
