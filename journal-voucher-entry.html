<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.container {
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }
.backBtn { background:#34495e;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }

.totalRow {
  font-weight:bold;
  background:#f2f2f2;
}
</style>
</head>

<body>

<div class="container">

<button class="backBtn" onclick="history.back()">⬅ Back</button>

<div class="box">
<h3>Journal Entry</h3>

<label>Date:</label>
<input type="date" id="date">

<br><br>

<div class="grid">

<!-- ROW 1 -->
<select id="dc1">
<option value="D">Debit</option>
<option value="C">Credit</option>
</select>

<select id="code1" onchange="autoFillAccount(1)"></select>
<input id="accountName1" readonly>

<select id="subDesc1">
<option value="">None</option>
<option value="Tenant">Tenant</option>
</select>

<input type="number" id="amount1">

<select id="subName1"></select>

<!-- ROW 2 -->
<select id="dc2">
<option value="D">Debit</option>
<option value="C">Credit</option>
</select>

<select id="code2" onchange="autoFillAccount(2)"></select>
<input id="accountName2" readonly>

<select id="subDesc2">
<option value="">None</option>
<option value="Tenant">Tenant</option>
</select>

<input type="number" id="amount2">

<select id="subName2"></select>

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save</button>

</div>

<div class="box">

<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>D/C</th>
<th>Code</th>
<th>Account</th>
<th>Sub</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

<tfoot>
<tr class="totalRow">
<td colspan="4">TOTAL</td>
<td id="totalDebit">Debit: 0</td>
<td id="totalCredit">Credit: 0</td>
<td></td>
</tr>
</tfoot>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];

// FORMAT DATE → dd/mm/yyyy
function formatDate(dateStr){
let d = new Date(dateStr);
let day = String(d.getDate()).padStart(2,'0');
let month = String(d.getMonth()+1).padStart(2,'0');
let year = d.getFullYear();
return `${day}/${month}/${year}`;
}

// LOAD COA
function loadCOA(){
let html = "<option value=''>Select</option>";
coa.forEach(a=>{
html += `<option value="${a.code}" data-name="${a.name}">
${a.code} - ${a.name}
</option>`;
});
code1.innerHTML = html;
code2.innerHTML = html;
}

// AUTO NAME
function autoFillAccount(row){
let select = document.getElementById("code"+row);
let selected = select.options[select.selectedIndex];
document.getElementById("accountName"+row).value = selected.getAttribute("data-name") || "";
}

// LOAD CLIENTS
function loadClients(){
let html = "<option value=''>Select</option>";
clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});
subName1.innerHTML = html;
subName2.innerHTML = html;
}

// ADD ENTRY
function addEntry(){

let dateVal = document.getElementById("date").value;

if(!dateVal){
alert("Select date");
return;
}

let rows = [1,2];

rows.forEach(r=>{

let dc = document.getElementById("dc"+r).value;
let code = document.getElementById("code"+r).value;
let acc = document.getElementById("accountName"+r).value;
let amount = Number(document.getElementById("amount"+r).value);
let sub = document.getElementById("subName"+r).value;

if(!code || amount <= 0) return;

// AR only may client
if(code !== "1100"){
sub = "";
}

entries.push({
date:dateVal,
dc:dc,
code:code,
account:acc,
amount:amount,
sub:sub
});

});

localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
clearForm();
}

// LOAD TABLE + TOTAL
function loadTable(){

let html = "";
let totalD = 0;
let totalC = 0;

entries.forEach((e,i)=>{

if(e.dc === "D") totalD += e.amount;
if(e.dc === "C") totalC += e.amount;

html += `
<tr>
<td>${formatDate(e.date)}</td>
<td>${e.dc}</td>
<td>${e.code}</td>
<td>${e.account}</td>
<td>${e.sub || ""}</td>
<td>${e.amount}</td>
<td><button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button></td>
</tr>
`;

});

table.innerHTML = html;

document.getElementById("totalDebit").innerText = "Debit: " + totalD;
document.getElementById("totalCredit").innerText = "Credit: " + totalC;
}

// DELETE
function deleteEntry(i){
entries.splice(i,1);
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}

// CLEAR
function clearForm(){
amount1.value="";
amount2.value="";
}

// INIT
loadCOA();
loadClients();
loadTable();

</script>

</body>
</html>
