<!DOCTYPE html>
<html>
<head>
<title>Journal Voucher</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.container {
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:10px;
}

input, select {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="container">

<div class="box">
<h3>Journal Entry (2 Rows)</h3>

<div class="grid">

<!-- ROW 1 -->
<select id="dc1">
<option value="D">Debit</option>
<option value="C">Credit</option>
</select>

<select id="code1" onchange="autoFillAccount(1)"></select>
<input id="accountName1" readonly>

<select id="subDesc1">
<option value="">None</option>
<option value="Tenant">Tenant</option>
</select>

<input type="number" id="amount1">

<select id="subName1"></select>

<!-- ROW 2 -->
<select id="dc2">
<option value="D">Debit</option>
<option value="C">Credit</option>
</select>

<select id="code2" onchange="autoFillAccount(2)"></select>
<input id="accountName2" readonly>

<select id="subDesc2">
<option value="">None</option>
<option value="Tenant">Tenant</option>
</select>

<input type="number" id="amount2">

<select id="subName2"></select>

</div>

<br>
<button class="saveBtn" onclick="addEntry()">Save Transaction</button>

</div>

<div class="box">

<h3>Journal Records</h3>

<table>
<thead>
<tr>
<th>D/C</th>
<th>Code</th>
<th>Account Name</th>
<th>Sub Desc</th>
<th>Amount</th>
<th>Sub Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("jv")) || [];
let clients = JSON.parse(localStorage.getItem("tenants")) || [];
let coa = JSON.parse(localStorage.getItem("coa")) || [];

// LOAD COA
function loadCOA(){

let html = "<option value=''>Select</option>";

coa.forEach(a=>{
html += `<option value="${a.code}" data-name="${a.name}">
${a.code} - ${a.name}
</option>`;
});

code1.innerHTML = html;
code2.innerHTML = html;
}

// AUTO ACCOUNT NAME
function autoFillAccount(row){

let select = document.getElementById("code"+row);
let selected = select.options[select.selectedIndex];

let name = selected.getAttribute("data-name");

document.getElementById("accountName"+row).value = name || "";
}

// LOAD CLIENTS
function loadClients(){

let html = "<option value=''>Select</option>";

clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});

subName1.innerHTML = html;
subName2.innerHTML = html;
}

// ADD ENTRY (2 ROWS)
function addEntry(){

let rows = [1,2];

rows.forEach(r=>{

let dc = document.getElementById("dc"+r).value;
let code = document.getElementById("code"+r).value;
let acc = document.getElementById("accountName"+r).value;
let subDesc = document.getElementById("subDesc"+r).value;
let amount = Number(document.getElementById("amount"+r).value);
let sub = document.getElementById("subName"+r).value;

if(!code || amount <= 0) return;

// 🔥 ONLY AR CAN HAVE CLIENT
if(code !== "1100"){
sub = "";
subDesc = "";
}

entries.push({
dc:dc,
code:code,
account:acc,
subDesc:subDesc,
amount:amount,
subName:sub
});

});

localStorage.setItem("jv", JSON.stringify(entries));

loadTable();
clearForm();
}

// LOAD TABLE
function loadTable(){

let html = "";

entries.forEach((e,i)=>{

html += `
<tr>
<td>${e.dc}</td>
<td>${e.code}</td>
<td>${e.account}</td>
<td>${e.subDesc}</td>
<td>${e.amount}</td>
<td>${e.subName}</td>
<td>
<button class="deleteBtn" onclick="deleteEntry(${i})">Delete</button>
</td>
</tr>
`;

});

table.innerHTML = html;
}

// DELETE
function deleteEntry(i){
entries.splice(i,1);
localStorage.setItem("jv", JSON.stringify(entries));
loadTable();
}

// CLEAR
function clearForm(){
amount1.value="";
amount2.value="";
}

// INIT
loadCOA();
loadClients();
loadTable();

</script>

</body>
</html>
