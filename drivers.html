<!DOCTYPE html>
<html>
<head>
<title>Drivers Payment Tracking</title>

<style>
body{
  font-family:Segoe UI;
  background:#f4f6fb;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input{
  padding:6px;
  margin-right:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.loadBtn{background:#3498db;color:white;}
.addBtn{background:#2ecc71;color:white;}

.table-wrap{
  overflow:auto;
}

table{
  border-collapse:collapse;
  width:max-content;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th{
  background:#2c3e50;
  color:white;
}

.subhead{
  background:#34495e;
}

input.cell{
  width:80px;
}
</style>
</head>

<body>

<div class="box">
<h3>🚗 Drivers Payment Tracking</h3>

From: <input type="date" id="fromDate">
To: <input type="date" id="toDate">

<button class="loadBtn" onclick="generateTable()">Load</button>
<button class="addBtn" onclick="addRow()">+ Add Driver</button>

</div>

<div class="box table-wrap">
<table id="mainTable"></table>
</div>

<script>

let months = [];
let data = [];

/* GENERATE MONTH RANGE */
function getMonths(from, to){

let arr=[];
let d=new Date(from);

while(d <= to){
arr.push({
label: d.toLocaleString('default',{month:'short',year:'numeric'}),
key: d.getFullYear()+"-"+d.getMonth()
});
d.setMonth(d.getMonth()+1);
}

return arr;
}

/* GENERATE TABLE */
function generateTable(){

let from = new Date(fromDate.value);
let to = new Date(toDate.value);

if(!fromDate.value || !toDate.value){
alert("Select dates");
return;
}

months = getMonths(from,to);

let html="";

/* HEADER 1 */
html += "<tr>";
html += "<th rowspan='2'>SN</th>";
html += "<th rowspan='2'>Driver</th>";
html += "<th rowspan='2'>Car</th>";
html += "<th rowspan='2'>Past Due</th>";

months.forEach(m=>{
html += `<th colspan="3">${m.label}</th>`;
});

html += "<th rowspan='2'>Total Due</th>";
html += "<th rowspan='2'>Total Payment</th>";
html += "<th rowspan='2'>Balance</th>";
html += "</tr>";

/* HEADER 2 */
html += "<tr>";

months.forEach(()=>{
html += "<th class='subhead'>Due</th>";
html += "<th class='subhead'>Pay</th>";
html += "<th class='subhead'>Bal</th>";
});

html += "</tr>";

mainTable.innerHTML = html;

}

/* ADD ROW */
function addRow(){

let row = document.createElement("tr");

let html="";

html += `<td>${data.length+1}</td>`;
html += `<td><input></td>`;
html += `<td><input></td>`;
html += `<td><input class="cell" value="0"></td>`;

months.forEach(()=>{
html += `<td><input class="cell due" value="0"></td>`;
html += `<td><input class="cell pay" value="0"></td>`;
html += `<td><input class="cell bal" value="0" readonly></td>`;
});

html += `<td class="tDue">0</td>`;
html += `<td class="tPay">0</td>`;
html += `<td class="tBal">0</td>`;

row.innerHTML = html;

mainTable.appendChild(row);

/* AUTO CALC */
row.querySelectorAll("input").forEach(inp=>{
inp.oninput = ()=>calcRow(row);
});

}

/* CALCULATION */
function calcRow(row){

let dues = row.querySelectorAll(".due");
let pays = row.querySelectorAll(".pay");
let bals = row.querySelectorAll(".bal");

let totalDue=0;
let totalPay=0;

dues.forEach((d,i)=>{
let due = Number(d.value)||0;
let pay = Number(pays[i].value)||0;

let bal = due - pay;

bals[i].value = bal.toFixed(2);

totalDue += due;
totalPay += pay;
});

row.querySelector(".tDue").innerText = totalDue.toFixed(2);
row.querySelector(".tPay").innerText = totalPay.toFixed(2);
row.querySelector(".tBal").innerText = (totalDue-totalPay).toFixed(2);

}

</script>

</body>
</html>
