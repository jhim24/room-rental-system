<!DOCTYPE html>
<html>
<head>
<title>Drivers Management</title>

<style>
body{
  font-family:Segoe UI;
  background:#eef2f7;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.addBtn{background:#2ecc71;color:white;}
.delBtn{background:red;color:white;}

.table-wrap{
  overflow:auto;
}

table{
  border-collapse:collapse;
  width:max-content;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th{
  background:#2c3e50;
  color:white;
}

input{
  width:90px;
  padding:4px;
}

.total{
  font-weight:bold;
  background:#ecf0f1;
}
</style>
</head>

<body>

<div class="box">
<h3>🚗 Drivers Monthly Table</h3>

<button class="addBtn" onclick="addRow()">+ Add Driver</button>

</div>

<div class="box table-wrap">
<table id="tbl"></table>
</div>

<script>

/* MONTHS STATIC JAN–DEC */
const months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

/* BUILD TABLE */
function buildTable(){

let html="";

/* HEADER */
html+="<tr>";
html+="<th>Driver</th>";
html+="<th>Car Model</th>";
html+="<th>Car No Old</th>";
html+="<th>Car No New</th>";
html+="<th>Prev Bal</th>";

months.forEach(m=>{
html+=`<th>${m}</th>`;
});

html+="<th>Total</th>";
html+="<th>Action</th>";
html+="</tr>";

tbl.innerHTML = html;

}

buildTable();

/* ADD ROW */
function addRow(){

let tr=document.createElement("tr");

let html="";

html+=`<td><input></td>`;
html+=`<td><input></td>`;
html+=`<td><input></td>`;
html+=`<td><input></td>`;
html+=`<td><input class="prev" value="0"></td>`;

months.forEach(()=>{
html+=`<td><input class="m" value="0"></td>`;
});

html+=`<td class="total">0</td>`;

html+=`
<td>
<button class="delBtn" onclick="delRow(this)">Delete</button>
</td>
`;

tr.innerHTML=html;

tbl.appendChild(tr);

/* AUTO CALC */
tr.querySelectorAll("input").forEach(inp=>{
inp.oninput=()=>calcRow(tr);
});

}

/* DELETE */
function delRow(btn){
btn.closest("tr").remove();
}

/* CALC */
function calcRow(tr){

let prev = Number(tr.querySelector(".prev").value)||0;

let monthsVal = tr.querySelectorAll(".m");

let total = prev;

monthsVal.forEach(m=>{
total += Number(m.value)||0;
});

tr.querySelector(".total").innerText = total.toFixed(2);

}

</script>

</body>
</html>
