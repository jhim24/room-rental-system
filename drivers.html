<!DOCTYPE html>
<html>
<head>
<title>Drivers Excel Table</title>

<style>
body{
  font-family:Calibri;
  background:#f5f7fb;
  padding:20px;
}

/* BOX */
.box{
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
}

/* BUTTON */
button{
  padding:6px 10px;
  border:none;
  cursor:pointer;
}

.add{background:#27ae60;color:white;}
.del{background:red;color:white;}

/* TABLE */
.table-wrap{
  overflow:auto;
}

table{
  border-collapse:collapse;
  width:max-content;
}

th,td{
  border:1px solid #999;
  padding:4px;
  text-align:center;
  font-size:12px;
}

/* HEADER */
th{
  background:#e3eaf5;
  font-weight:bold;
}

/* INPUT */
input{
  width:70px;
  border:none;
  outline:none;
  text-align:center;
}

/* TOTAL */
.total{
  background:#dfe6e9;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="box">
<h3>🚗 Drivers Payment (Excel Style)</h3>
<button class="add" onclick="addRow()">+ Add Driver</button>
</div>

<div class="box table-wrap">
<table id="tbl"></table>
</div>

<script>

const months = [
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

/* BUILD HEADER */
function build(){

let html="";

/* HEADER */
html+="<tr>";
html+="<th rowspan='2'>Driver</th>";
html+="<th rowspan='2'>Car</th>";
html+="<th rowspan='2'>Old</th>";
html+="<th rowspan='2'>New</th>";
html+="<th rowspan='2'>Prev Bal</th>";

months.forEach(m=>{
html+=`<th colspan="3">${m}</th>`;
});

html+="<th rowspan='2'>TOTAL</th>";
html+="<th rowspan='2'>Action</th>";
html+="</tr>";

/* SUB HEADER */
html+="<tr>";

months.forEach(()=>{
html+="<th>Due</th>";
html+="<th>Pay</th>";
html+="<th>Bal</th>";
});

html+="</tr>";

tbl.innerHTML = html;

}

build();

/* ADD ROW */
function addRow(){

let tr=document.createElement("tr");

let html="";

html+=`<td><input></td>`;
html+=`<td><input></td>`;
html+=`<td><input></td>`;
html+=`<td><input></td>`;
html+=`<td><input class="prev" value="0"></td>`;

months.forEach(()=>{
html+=`<td><input class="due" value="0"></td>`;
html+=`<td><input class="pay" value="0"></td>`;
html+=`<td><input class="bal" readonly></td>`;
});

html+=`<td class="total">0</td>`;

html+=`
<td>
<button class="del" onclick="delRow(this)">X</button>
</td>
`;

tr.innerHTML = html;

tbl.appendChild(tr);

/* AUTO CALC */
tr.querySelectorAll("input").forEach(inp=>{
inp.oninput=()=>calcRow(tr);
});

}

/* DELETE */
function delRow(btn){
btn.closest("tr").remove();
calcGrand();
}

/* CALCULATE PER ROW */
function calcRow(tr){

let prev = Number(tr.querySelector(".prev").value)||0;

let dues = tr.querySelectorAll(".due");
let pays = tr.querySelectorAll(".pay");
let bals = tr.querySelectorAll(".bal");

let running = prev;
let total = prev;

dues.forEach((d,i)=>{

let due = Number(d.value)||0;
let pay = Number(pays[i].value)||0;

running = running + due - pay;

bals[i].value = running.toFixed(2);

total += due;

});

/* TOTAL ROW */
tr.querySelector(".total").innerText = total.toFixed(2);

calcGrand();

}

/* GRAND TOTAL */
function calcGrand(){

let rows = document.querySelectorAll("#tbl tr");
let sum = 0;

rows.forEach(r=>{
let t = r.querySelector(".total");
if(t){
sum += Number(t.innerText)||0;
}
});

/* REMOVE OLD FOOTER */
let old = document.getElementById("grandRow");
if(old) old.remove();

/* ADD FOOTER */
let tr=document.createElement("tr");
tr.id="grandRow";

tr.innerHTML = `
<td colspan="5"><b>GRAND TOTAL</b></td>
<td colspan="${months.length*3}">
<b>${sum.toFixed(2)}</b>
</td>
<td></td>
<td></td>
`;

tbl.appendChild(tr);

}

</script>

</body>
</html>
