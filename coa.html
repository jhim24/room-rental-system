<!DOCTYPE html>
<html>
<head>
<title>Chart of Accounts</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.saveBtn{background:#2ecc71;color:white;}
.deleteBtn{background:red;color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h3>📚 Chart of Accounts</h3>

<input id="code" placeholder="Account Code">
<input id="name" placeholder="Account Name">

<select id="type">
<option>Asset</option>
<option>Liability</option>
<option>Equity</option>
<option>Income</option>
<option selected>Expenses</option> <!-- 🔥 NEW -->
</select>

<button class="saveBtn" onclick="addAccount()">Add</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Code</th>
<th>Name</th>
<th>Type</th>
<th>Action</th>
</tr>
</thead>

<tbody id="coaTable"></tbody>

</table>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts")) || [];

/* ADD */
function addAccount(){

let code = document.getElementById("code").value;
let name = document.getElementById("name").value;
let type = document.getElementById("type").value;

if(!code || !name){
alert("Fill all fields");
return;
}

accounts.push({code,name,type});

save();
loadCOA();

code.value="";
name.value="";
}

/* DELETE */
function deleteAcc(i){
if(confirm("Delete account?")){
accounts.splice(i,1);
save();
loadCOA();
}
}

/* LOAD */
function loadCOA(){

coaTable.innerHTML="";

accounts.forEach((a,i)=>{

let color = "";

/* COLOR BY TYPE */
if(a.type==="Income") color="#d4edda";
if(a.type==="Expenses") color="#f8d7da"; // 🔥 EXPENSE COLOR
if(a.type==="Asset") color="#d1ecf1";
if(a.type==="Liability") color="#fff3cd";

coaTable.innerHTML += `
<tr style="background:${color}">
<td>${i+1}</td>
<td>${a.code}</td>
<td>${a.name}</td>
<td>${a.type}</td>
<td>
<button class="deleteBtn" onclick="deleteAcc(${i})">Delete</button>
</td>
</tr>
`;

});

}

/* SAVE */
function save(){
localStorage.setItem("accounts", JSON.stringify(accounts));
}

/* INIT */
loadCOA();

</script>

</body>
</html>
