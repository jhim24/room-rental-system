<!DOCTYPE html>
<html>
<head>
<title>Chart of Accounts</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

/* INPUT */
input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html?v=5'">📊 Dashboard</button>
<button onclick="location.href='rooms.html?v=5'">🏠 Rooms</button>
<button onclick="location.href='clients.html?v=5'">👥 Clients</button>
<button onclick="location.href='journal-voucher-entry.html?v=5'">📒 Journal</button>
<button onclick="location.href='coa.html?v=5'">📚 Chart of Accounts</button>
</div>
</div>

<div class="main">

<div class="box">
<h3>Add Account</h3>

<select id="type">
<option>Asset</option>
<option>Income</option>
<option>Expense</option>
</select>

<input id="accountName" placeholder="Account Name">

<button class="saveBtn" onclick="addAccount()">Save</button>

</div>

<div class="box">
<h3>Account List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Type</th>
<th>Account Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="coaTable"></tbody>

</table>

</div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("coa")) || [];

// ADD
function addAccount(){

if(!accountName.value){
alert("Enter account name");
return;
}

accounts.push({
type: type.value,
name: accountName.value
});

localStorage.setItem("coa", JSON.stringify(accounts));

loadTable();
accountName.value="";
}

// LOAD
function loadTable(){

let html = "";

accounts.forEach((a,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${a.type}</td>
<td>${a.name}</td>
<td>
<button class="deleteBtn" onclick="deleteAcc(${i})">Delete</button>
</td>
</tr>
`;
});

coaTable.innerHTML = html;
}

// DELETE
function deleteAcc(i){
accounts.splice(i,1);
localStorage.setItem("coa", JSON.stringify(accounts));
loadTable();
}

// INIT
loadTable();

</script>

</body>
</html>
