<!DOCTYPE html>
<html>
<head>
<title>Chart of Accounts</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="location.href='index.html'">Dashboard</button>
<button onclick="location.href='rooms.html'">Rooms</button>
<button onclick="location.href='clients.html'">Clients</button>
<button onclick="location.href='journal-voucher-entry.html'">Journal</button>
<button onclick="location.href='coa.html'">Chart of Accounts</button>
<a href="general-ledger.html">General Ledger</a>
</div>
</div>

<div class="main">

<div class="box">
<h3>Add Account</h3>

<select id="type">
<option>Asset</option>
<option>Income</option>
</select>

<input id="accountName" placeholder="Account Name">
<input id="code" placeholder="Account Code">

<button onclick="saveAccount()">Save</button>

</div>

<div class="box">
<h3>Account List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Code</th>
<th>Type</th>
<th>Account Name</th>
<th>Action</th>
</tr>
</thead>

<tbody id="coaTable"></tbody>

</table>

</div>

</div>

<script>

// STORAGE
function getAccounts(){
  return JSON.parse(localStorage.getItem("accounts")) || [];
}

function saveAccounts(data){
  localStorage.setItem("accounts", JSON.stringify(data));
}

// SAVE ACCOUNT
function saveAccount(){

let name = document.getElementById("accountName").value.trim();
let type = document.getElementById("type").value;
let codeInput = document.getElementById("code").value;
let code = codeInput || Date.now().toString().slice(-4);

if(name === ""){
  alert("Enter account name");
  return;
}

let accounts = getAccounts();

accounts.push({
  code: code,
  type: type,
  name: name
});

saveAccounts(accounts);

alert("Saved!");

// CLEAR
document.getElementById("accountName").value="";
document.getElementById("code").value="";

loadTable();
}

// LOAD TABLE
function loadTable(){

let accounts = getAccounts();

let html = "";

accounts.forEach((a,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${a.code}</td>
<td>${a.type}</td>
<td>${a.name}</td>
<td>
<button onclick="deleteAcc(${i})">Delete</button>
</td>
</tr>
`;
});

document.getElementById("coaTable").innerHTML = html;
}

// DELETE
function deleteAcc(i){

let accounts = getAccounts();
accounts.splice(i,1);

saveAccounts(accounts);
loadTable();
}

// INIT
window.onload = loadTable;

</script>

</body>
</html>
