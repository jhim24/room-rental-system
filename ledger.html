<!DOCTYPE html>
<html>
<head>
<title>Ledger</title>

<style>
body{font-family:Arial;padding:20px;background:#eef3ff}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#3498db;color:white}
</style>
</head>

<body>

<h2>Client Ledger</h2>

<select id="client"></select>
<button onclick="loadLedger()">Load</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Dr</th>
<th>Cr</th>
<th>Balance</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>

<h3>Balance: <span id="bal">0</span></h3>

<script>

let tenants=JSON.parse(localStorage.getItem("tenants"))||[];

function loadClients(){
let h="<option></option>";
tenants.forEach(t=>{
h+=`<option>${t.name}</option>`;
});
client.innerHTML=h;
}

function loadLedger(){

let c=client.value.trim().toLowerCase();
let jv=JSON.parse(localStorage.getItem("jv"))||[];

let h="";
let bal=0;

jv.forEach((e,i)=>{

if((e.sub||"").toLowerCase()!=c) return;
if(e.code!="1100") return;

let dr="",cr="";

if(e.dc=="D"){
dr=e.amt;
bal+=e.amt;
}else{
cr=e.amt;
bal-=e.amt;
}

h+=`
<tr>
<td>${i+1}</td>
<td>${new Date(e.date).toLocaleDateString('en-GB')}</td>
<td>${dr}</td>
<td>${cr}</td>
<td>${bal}</td>
</tr>`;
});

tbl.innerHTML=h;
balEl.innerText=bal;
}

let balEl=document.getElementById("bal");

loadClients();

</script>

</body>
</html>
