<!DOCTYPE html>
<html>
<head>
<title>Client Ledger</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.container { padding:20px; }

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

select, button {
  padding:8px;
  margin:5px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }

.balanceBox {
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="box">
<h3>Client Ledger</h3>

<select id="client" onchange="loadLedger()"></select>
<button onclick="loadLedger()">Load</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Date</th>
<th>Account</th>
<th>Dr</th>
<th>Cr</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

</table>

<div class="balanceBox">
Balance: <span id="balance">0</span>
</div>

</div>

</div>

<script>

// LOAD CLIENT LIST
function loadClients(){

let clients = JSON.parse(localStorage.getItem("tenants")) || [];

let html = "<option value=''>Select Client</option>";

clients.forEach(c=>{
html += `<option value="${c.name}">${c.name}</option>`;
});

document.getElementById("client").innerHTML = html;
}

// LOAD LEDGER (CONNECTED SA JOURNAL)
function loadLedger(){

let selectedClient = document.getElementById("client").value;

if(!selectedClient) return;

let entries = JSON.parse(localStorage.getItem("jv")) || [];

let html = "";
let balance = 0;

entries.forEach((e,i)=>{

// 🔥 MATCH CLIENT (FIXED)
if((e.sub || "").trim().toLowerCase() !== selectedClient.trim().toLowerCase()) return;

// 🔥 ONLY AR
if(e.code !== "1100") return;

let dr = "";
let cr = "";

// COMPUTE BALANCE
if(e.dc === "D"){
dr = e.amount;
balance += e.amount;
}else{
cr = e.amount;
balance -= e.amount;
}

let date = new Date(e.date).toLocaleDateString('en-GB');

html += `
<tr>
<td>${i+1}</td>
<td>${date}</td>
<td>${e.account}</td>
<td>${dr}</td>
<td>${cr}</td>
<td>${balance}</td>
</tr>
`;

});

document.getElementById("ledgerTable").innerHTML = html;
document.getElementById("balance").innerText = balance;
}

// INIT
loadClients();

</script>

</body>
</html>
