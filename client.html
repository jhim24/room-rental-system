<!DOCTYPE html>
<html>
<head>
<title>Clients</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.menu button:hover { background:#3498db; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* GLASS BOX */
.box {
  background: rgba(255,255,255,0.9);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* FORM GRID */
.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

/* INPUT STYLE */
input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%;
}

/* BUTTON */
button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71; color:white; }
.deleteBtn { background:red; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

th {
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="go('index.html')">📊 Dashboard</button>
<button onclick="go('rooms.html')">🏠 Rooms</button>
<button onclick="go('client.html')">👥 Clients</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- FORM -->
<div class="box">
<h3>Add Client Information</h3>

<div class="formGrid">

<input id="name" placeholder="Full Name">
<input id="nationality" placeholder="Nationality">
<input id="qid" placeholder="QID">

<input type="date" id="entryDate">
<input type="date" id="exitDate">

<select id="roomSelect"></select>

<select id="category">
<option>Bed Space</option>
<option>Tenant</option>
<option>Freelancer</option>
<option>Company Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>

</div>

<button class="saveBtn" onclick="addClient()">Save Client</button>

</div>

<!-- TABLE -->
<div class="box">
<h3>Client Records</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Nationality</th>
<th>QID</th>
<th>Entry</th>
<th>Exit</th>
<th>Room</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

</div>

</div>

<script>

// NAV
function go(page){
window.location.href = page;
}

// DATA
let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

// LOAD ROOMS
function loadRooms(){
roomSelect.innerHTML="";

if(rooms.length === 0){
roomSelect.innerHTML="<option>No rooms</option>";
return;
}

rooms.forEach(r=>{
roomSelect.innerHTML += `<option value="${r.number}">${r.number}</option>`;
});
}

// ADD CLIENT
function addClient(){

if(!name.value || !qid.value){
alert("Fill required fields");
return;
}

tenants.push({
name:name.value,
nationality:nationality.value,
qid:qid.value,
entry:entryDate.value,
exit:exitDate.value,
room:roomSelect.value,
category:category.value
});

localStorage.setItem("tenants", JSON.stringify(tenants));

// CLEAR
name.value="";
nationality.value="";
qid.value="";
entryDate.value="";
exitDate.value="";

loadClients();
}

// LOAD TABLE
function loadClients(){

clientTable.innerHTML="";

tenants.forEach((t,i)=>{
clientTable.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.nationality||""}</td>
<td>${t.qid||""}</td>
<td>${t.entry||""}</td>
<td>${t.exit||""}</td>
<td>${t.room}</td>
<td>${t.category}</td>
<td>
<button class="deleteBtn" onclick="deleteClient(${i})">Delete</button>
</td>
</tr>
`;
});
}

// DELETE
function deleteClient(i){
if(confirm("Delete client?")){
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadClients();
}
}

// INIT
loadRooms();
loadClients();

</script>

</body>
</html>
