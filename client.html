<!DOCTYPE html>
<html>
<head>
<title>Clients</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.sidebar h2 {
  text-align:center;
}

.menu {
  margin-top:30px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  text-align:left;
}

.menu button:hover {
  background:#3498db;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* BOX */
.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* INPUT */
input, select {
  padding:8px;
  margin:5px;
}

/* BUTTON */
button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71; color:white; }
.deleteBtn { background:red; color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db; color:white; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="go('index.html')">📊 Dashboard</button>
<button onclick="go('rooms.html')">🏠 Rooms</button>
<button onclick="go('client.html')">👥 Clients</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="box">
<h3>Add Client</h3>

<input id="name" placeholder="Client Name">

<select id="roomSelect"></select>

<select id="category">
<option>Bed Space</option>
<option>Tenant</option>
<option>Freelancer</option>
<option>Company Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>

<button class="saveBtn" onclick="addClient()">Save</button>

</div>

<div class="box">
<h3>Client List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Room</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

</div>

</div>

<script>

// NAVIGATION
function go(page){
window.location.href = page;
}

// DATA
let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

// LOAD ROOMS
function loadRooms(){
roomSelect.innerHTML="";

if(rooms.length === 0){
roomSelect.innerHTML = "<option>No rooms yet</option>";
return;
}

rooms.forEach(r=>{
roomSelect.innerHTML += `<option value="${r.number}">${r.number}</option>`;
});
}

// ADD CLIENT
function addClient(){

if(!name.value){
alert("Enter client name");
return;
}

tenants.push({
name:name.value,
room:roomSelect.value,
category:category.value
});

localStorage.setItem("tenants", JSON.stringify(tenants));

name.value="";
loadClients();
}

// LOAD CLIENTS
function loadClients(){

clientTable.innerHTML="";

tenants.forEach((t,i)=>{
clientTable.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.room}</td>
<td>${t.category}</td>
<td>
<button class="deleteBtn" onclick="deleteClient(${i})">Delete</button>
</td>
</tr>
`;
});
}

// DELETE
function deleteClient(i){
if(confirm("Delete client?")){
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadClients();
}
}

// INIT
loadRooms();
loadClients();

</script>

</body>
</html>
