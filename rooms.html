<!DOCTYPE html>
<html>
<head>
<title>Rooms</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.menu button:hover { background:#3498db; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

/* INPUT */
input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:5px;
}

.saveBtn { background:#2ecc71;color:white; }
.updateBtn { background:#3498db;color:white; }
.editBtn { background:orange;color:white; }
.deleteBtn { background:red;color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">

<button onclick="location.href='index.html?v=3'">
📊 Dashboard
</button>

<button onclick="location.href='rooms.html?v=3'">
🏠 Rooms
</button>

<button onclick="location.href='clients.html?v=3'">
👥 Clients
</button>

<button onclick="location.href='journal-voucher-entry.html?v=3'">
📒 Journal Voucher
</button>

<button onclick="location.href='coa.html?v=5'">
📚 Chart of Accounts
</button>

</div>
</div>

<div class="main">

<div class="box">
<h3>Add Room</h3>

<input id="roomNo" placeholder="Room #">
<input id="capacity" type="number" placeholder="Capacity">

<br>
<button class="saveBtn" onclick="addRoom()">Save</button>
<button class="updateBtn" onclick="updateRoom()">Update</button>

</div>

<div class="box">
<h3>Room List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Room</th>
<th>Capacity</th>
<th>Occupied</th>
<th>Available</th>
<th>Action</th>
</tr>
</thead>

<tbody id="roomTable"></tbody>

</table>

</div>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

let editIndex = -1;

// SAVE
function addRoom(){

let number = document.getElementById("roomNo").value;
let cap = document.getElementById("capacity").value;

if(!number || !cap){
alert("Fill all fields");
return;
}

rooms.push({
number:number,
capacity:Number(cap)
});

save();
loadRooms();

clearForm();
}

// EDIT
function editRoom(index){

let r = rooms[index];

document.getElementById("roomNo").value = r.number;
document.getElementById("capacity").value = r.capacity;

editIndex = index;
}

// UPDATE
function updateRoom(){

if(editIndex === -1){
alert("Select room to edit");
return;
}

let number = document.getElementById("roomNo").value;
let cap = document.getElementById("capacity").value;

rooms[editIndex] = {
number:number,
capacity:Number(cap)
};

save();
loadRooms();
clearForm();

editIndex = -1;
}

// DELETE
function deleteRoom(i){
if(confirm("Delete room?")){
rooms.splice(i,1);
save();
loadRooms();
}
}

// LOAD TABLE
function loadRooms(){

roomTable.innerHTML="";

rooms.forEach((r,i)=>{

let occupied = tenants.filter(t=>t.room === r.number).length;
let available = r.capacity - occupied;

roomTable.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${r.number}</td>
<td>${r.capacity}</td>
<td>${occupied}</td>
<td>${available}</td>
<td>
<button class="editBtn" onclick="editRoom(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteRoom(${i})">Delete</button>
</td>
</tr>
`;
});
}

// SAVE STORAGE
function save(){
localStorage.setItem("rooms", JSON.stringify(rooms));
}

// CLEAR FORM
function clearForm(){
document.getElementById("roomNo").value="";
document.getElementById("capacity").value="";
}

// INIT
loadRooms();

</script>

</body>
</html>
