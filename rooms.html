<!DOCTYPE html>
<html>
<head>
<title>Room Management</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.7);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  text-align:left;
}

.menu button:hover { background:#3498db; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th,td {
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th { background:#3498db;color:white; }

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="go('index.html')">📊 Dashboard</button>
<button>🏠 Rooms</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="box">
<h3>Add Room</h3>
<input id="roomNo" placeholder="Room #">
<input id="capacity" type="number" placeholder="Capacity">
<button class="saveBtn" onclick="addRoom()">Save</button>
</div>

<div class="box">
<h3>Room List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Room</th>
<th>Capacity</th>
<th>Occupied</th>
<th>Available</th>
<th>Action</th>
</tr>
</thead>

<tbody id="roomTable"></tbody>
</table>

</div>

</div>

<script>

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

function save(){
localStorage.setItem("rooms", JSON.stringify(rooms));
}

// ADD ROOM
function addRoom(){

if(!roomNo.value || !capacity.value){
alert("Fill all fields");
return;
}

rooms.push({
number:roomNo.value,
capacity:Number(capacity.value)
});

save();
loadRooms();

roomNo.value="";
capacity.value="";
}

// LOAD TABLE
function loadRooms(){

roomTable.innerHTML="";

rooms.forEach((r,i)=>{

let occupied = tenants.filter(t=>t.room===r.number).length;
let available = r.capacity - occupied;

roomTable.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${r.number}</td>
<td>${r.capacity}</td>
<td>${occupied}</td>
<td>${available}</td>
<td>
<button class="deleteBtn" onclick="deleteRoom(${i})">Delete</button>
</td>
</tr>
`;

});
}

// DELETE
function deleteRoom(i){
if(confirm("Delete room?")){
rooms.splice(i,1);
save();
loadRooms();
}
}

// NAVIGATION
function go(page){
window.location.href = page;
}

loadRooms();

</script>

</body>
</html>
