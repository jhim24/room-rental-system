<!DOCTYPE html>
<html>
<head>
<title>Clients</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.menu button:hover { background:#3498db; }

.main {
  flex:1;
  padding:20px;
}

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  padding:8px;
  margin:5px;
  width:100%;
}

.formGrid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">
<button onclick="go('index.html')">📊 Dashboard</button>
<button onclick="go('rooms.html')">🏠 Rooms</button>
<button onclick="go('clients.html')">👥 Clients</button>
</div>
</div>

<div class="main">

<div class="box">
<h3>Add Client</h3>

<div class="formGrid">
<input id="name" placeholder="Full Name">
<input id="nationality" placeholder="Nationality">
<input id="qid" placeholder="QID">
<input type="date" id="entry">
<input type="date" id="exit">
<select id="roomSelect"></select>
<select id="category">
<option>Bed Space</option>
<option>Tenant</option>
<option>Freelancer</option>
<option>Company Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>
</div>

<button class="saveBtn" onclick="addClient()">Save</button>
</div>

<div class="box">
<h3>Client List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Nationality</th>
<th>QID</th>
<th>Entry</th>
<th>Exit</th>
<th>Room</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>
</table>

</div>

</div>

<script>

function go(page){
window.location.href = page;
}

let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

function loadRooms(){
roomSelect.innerHTML="";
rooms.forEach(r=>{
roomSelect.innerHTML += `<option>${r.number}</option>`;
});
}

function addClient(){

if(!name.value) return alert("Enter name");

tenants.push({
name:name.value,
nationality:nationality.value,
qid:qid.value,
entry:entry.value,
exit:exit.value,
room:roomSelect.value,
category:category.value
});

localStorage.setItem("tenants", JSON.stringify(tenants));

name.value="";
nationality.value="";
qid.value="";
entry.value="";
exit.value="";

loadClients();
}

function loadClients(){
clientTable.innerHTML="";

tenants.forEach((t,i)=>{
clientTable.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.nationality||""}</td>
<td>${t.qid||""}</td>
<td>${t.entry||""}</td>
<td>${t.exit||""}</td>
<td>${t.room}</td>
<td>${t.category}</td>
<td><button onclick="deleteClient(${i})">Delete</button></td>
</tr>
`;
});
}

function deleteClient(i){
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadClients();
}

loadRooms();
loadClients();

</script>

</body>
</html>
