<!DOCTYPE html>
<html>
<head>
<title>Clients</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background: linear-gradient(135deg,#1d2b64,#f8cdda);
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background: rgba(0,0,0,0.75);
  color:white;
  padding:20px;
}

.menu button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.menu button:hover { background:#3498db; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

/* GRID */
.formGrid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

/* INPUT */
input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%;
  box-sizing:border-box;
}

/* BUTTON */
button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.saveBtn { background:#2ecc71;color:white; }
.deleteBtn { background:red;color:white; }

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th { background:#3498db;color:white; }
</style>
</head>

<body>

<div class="sidebar">
<h2>🏨 SYSTEM</h2>

<div class="menu">

<button onclick="location.href='index.html?v=12'">
📊 Dashboard
</button>

<button onclick="location.href='rooms.html?v=12'">
🏠 Rooms
</button>

<button onclick="location.href='clients.html?v=12'">
👥 Clients
</button>

<button onclick="location.href='journal-voucher-entry.html?v=12'">
📒 Journal
</button>

<button onclick="location.href='coa.html?v=12'">
📚 Chart of Accounts
</button>

<button onclick="location.href='ledger.html?v=12'">
📘 Client Ledger
</button>
<a href="general-ledger.html">📊 General Ledger</a>
  <a href="tenant-ledger-table.html">📊 Tenant Ledger</a>
</div>
</div>

<div class="main">

<div class="box">
<h3>Add Client</h3>

<div class="formGrid">

<input id="name" placeholder="Full Name">

<select id="nationality">
<option value="">Select Nationality</option>
<option>Philippines</option>
<option>India</option>
<option>Nepal</option>
<option>Bangladesh</option>
<option>Pakistan</option>
<option>Sri Lanka</option>
<option>Egypt</option>
<option>Sudan</option>
<option>Kenya</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>
<option>Other</option>
</select>

<input id="qid" placeholder="QID">

<input type="date" id="entry">
<input type="date" id="exit">

<select id="roomSelect"></select>

<select id="category">
<option>Bed Space</option>
<option>Tenant</option>
<option>Freelancer</option>
<option>Company Staff</option>
<option>Office Staff</option>
<option>Store Keeper</option>
</select>

</div>

<button id="saveBtn" class="saveBtn">Save</button>

</div>

<div class="box">
<h3>Client List</h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Nationality</th>
<th>QID</th>
<th>Entry</th>
<th>Exit</th>
<th>Room</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

</div>

</div>

<script>

// LOAD DATA
let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

// LOAD ROOMS
function loadRooms(){
let roomSelect = document.getElementById("roomSelect");
roomSelect.innerHTML="";

if(rooms.length === 0){
roomSelect.innerHTML="<option>No Rooms</option>";
return;
}

rooms.forEach(r=>{
roomSelect.innerHTML += `<option value="${r.number}">${r.number}</option>`;
});
}

// ADD CLIENT FUNCTION
function addClient(){

console.log("SAVE CLICKED"); // debug

let nameVal = document.getElementById("name").value.trim();
let nationalityVal = document.getElementById("nationality").value;
let qidVal = document.getElementById("qid").value;
let entryVal = document.getElementById("entry").value;
let exitVal = document.getElementById("exit").value;
let roomVal = document.getElementById("roomSelect").value;
let categoryVal = document.getElementById("category").value;

if(nameVal === ""){
alert("Enter name");
return;
}

// GET LATEST STORAGE
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

tenants.push({
name: nameVal,
nationality: nationalityVal,
qid: qidVal,
entry: entryVal,
exit: exitVal,
room: roomVal,
category: categoryVal
});

// SAVE
localStorage.setItem("tenants", JSON.stringify(tenants));

// CLEAR
document.getElementById("name").value="";
document.getElementById("nationality").value="";
document.getElementById("qid").value="";
document.getElementById("entry").value="";
document.getElementById("exit").value="";

// RELOAD
loadClients();
}

// LOAD TABLE
function loadClients(){
let table = document.getElementById("clientTable");
table.innerHTML="";

let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

tenants.forEach((t,i)=>{
table.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.nationality || ""}</td>
<td>${t.qid || ""}</td>
<td>${t.entry || ""}</td>
<td>${t.exit || ""}</td>
<td>${t.room}</td>
<td>${t.category}</td>
<td>
<button class="deleteBtn" onclick="deleteClient(${i})">Delete</button>
</td>
</tr>
`;
});
}

// DELETE
function deleteClient(i){
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadClients();
}

// 🔥 EVENT LISTENER (NO FAIL BUTTON)
document.getElementById("saveBtn").addEventListener("click", addClient);

// INIT
loadRooms();
loadClients();

</script>

</body>
</html>
