<!DOCTYPE html>
<html>
<head>
<title>Reports</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#3498db;
  color:white;
}

.backBtn{
  background:#e74c3c;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#2980b9;
  color:white;
}

.total{
  font-weight:bold;
  background:#ecf0f1;
}
</style>
</head>

<body>

<div class="box header">
<h3>📊 Financial Report</h3>

<div>
<button class="btn" onclick="loadReport()">Refresh</button>
<button class="backBtn" onclick="goDashboard()">🏠 Dashboard</button>
</div>
</div>

<div class="box">

<h4>📘 Income Statement</h4>

<table>
<thead>
<tr>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

<tfoot>
<tr class="total">
<td>NET INCOME</td>
<td id="totalDr">0</td>
<td id="totalCr">0</td>
<td id="netIncome">0</td>
</tr>
</tfoot>

</table>

</div>

<div class="box">

<h4>📊 Summary</h4>

<p>Total Clients: <b id="totalClients">0</b></p>
<p>Total Journal Entries: <b id="totalJV">0</b></p>

</div>

<script>

/* ===== GET DATA ===== */
function getJV(){
return JSON.parse(localStorage.getItem("jv")) || [];
}

function getClients(){
return JSON.parse(localStorage.getItem("tenants")) || [];
}

/* ===== LOAD REPORT ===== */
function loadReport(){

let jv = getJV();
let map = {};

let totalDr = 0;
let totalCr = 0;

/* LOOP JOURNAL */
jv.forEach(entry=>{

entry.forEach(e=>{

let acc = e.acc || "Unknown";

if(!map[acc]){
map[acc] = {dr:0, cr:0};
}

let d = Number(e.d) || 0;
let c = Number(e.c) || 0;

map[acc].dr += d;
map[acc].cr += c;

totalDr += d;
totalCr += c;

});

});

/* BUILD TABLE */
let html="";

Object.keys(map).forEach(acc=>{

let dr = map[acc].dr;
let cr = map[acc].cr;
let bal = cr - dr; // income style

html += `
<tr>
<td>${acc}</td>
<td>${dr.toFixed(2)}</td>
<td>${cr.toFixed(2)}</td>
<td><b>${bal.toFixed(2)}</b></td>
</tr>
`;

});

reportTable.innerHTML = html || "<tr><td colspan='4'>No data</td></tr>";

/* TOTALS */
document.getElementById("totalDr").innerText = totalDr.toFixed(2);
document.getElementById("totalCr").innerText = totalCr.toFixed(2);
document.getElementById("netIncome").innerText = (totalCr - totalDr).toFixed(2);

/* SUMMARY */
let clients = getClients();
document.getElementById("totalClients").innerText = clients.length;
document.getElementById("totalJV").innerText = jv.length;

}

/* NAV */
function goDashboard(){
location.href = "index.html?v=12";
}

/* INIT */
loadReport();

</script>

</body>
</html>
