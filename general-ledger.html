<!DOCTYPE html>
<html>
<head>
<title>General Ledger</title>

<style>
body{
  font-family:Arial;
  background:#eef3ff;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.loadBtn{background:#3498db;color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h3>📘 General Ledger (Accounts Receivable)</h3>

<button class="loadBtn" onclick="loadLedger()">Load Ledger</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Account</th>
<th>Client</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

<tfoot>
<tr>
<td colspan="5"><b>GRAND TOTAL</b></td>
<td id="totalBalance">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

function getJV(){
try{
return JSON.parse(localStorage.getItem("jv")) || [];
}catch{
return [];
}
}

function loadLedger(){

let jv = getJV();
let map = {};
let total = 0;

jv.forEach(e=>{

if(!e || !e.acc) return;

let accName = e.acc.toLowerCase();
if(!accName.includes("receivable")) return;

let name = (e.sub || "").trim();
if(!name) return;

if(!map[name]){
map[name] = {dr:0, cr:0};
}

let amt = Number(e.amt || 0);
if(isNaN(amt)) amt = 0;

if(e.dc === "D"){
map[name].dr += amt;
}else if(e.dc === "C"){
map[name].cr += amt;
}

});

let html="";
let i=1;

Object.keys(map).forEach(name=>{

let dr = map[name].dr;
let cr = map[name].cr;
let balance = dr - cr;

total += balance;

html += `
<tr>
<td>${i++}</td>
<td>Accounts Receivable</td>
<td>${name}</td>
<td>${dr}</td>
<td>${cr}</td>
<td><b>${balance}</b></td>
</tr>
`;

});

ledgerTable.innerHTML = html || "<tr><td colspan='6'>No data</td></tr>";
totalBalance.innerText = total;
}

window.onload = loadLedger;

</script>

</body>
</html>
