<!DOCTYPE html>
<html>
<head>
<title>General Ledger</title>

<style>
body{
  font-family:Arial;
  background:#eef3ff;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:6px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.loadBtn{background:#3498db;color:white;}
.tenantBtn{background:#2ecc71;color:white;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h3>📘 General Ledger (Accounts Receivable)</h3>

<select id="accountFilter">
<option value="Accounts receivable">Accounts receivable</option>
</select>

<button class="loadBtn" onclick="loadLedger()">Load Ledger</button>
<button class="tenantBtn" onclick="window.location='tenant-ledger-table.html'">Tenant Ledger</button>

</div>

<div class="box">

<table>
<thead>
<tr>
<th>#</th>
<th>Account</th>
<th>Client</th>
<th>Total Dr</th>
<th>Total Cr</th>
<th>Balance</th>
</tr>
</thead>

<tbody id="ledgerTable"></tbody>

<tfoot>
<tr>
<td colspan="5"><b>GRAND TOTAL</b></td>
<td id="totalBalance">0</td>
</tr>
</tfoot>

</table>

</div>

<script>

// LOAD LEDGER (GROUPED BY CLIENT)
function loadLedger(){

let jv = JSON.parse(localStorage.getItem("jv")) || [];

let map = {};

// LOOP JOURNAL
jv.forEach(e=>{

if(!e.acc) return;

// ONLY RECEIVABLE
if(!e.acc.toLowerCase().includes("receivable")) return;

// CLIENT
let name = (e.sub || "No Client").trim();

// INIT
if(!map[name]){
map[name] = {dr:0, cr:0};
}

// ADD VALUES
let amt = Number(e.amt || 0);

if(e.dc === "D"){
map[name].dr += amt;
}else{
map[name].cr += amt;
}

});

// BUILD TABLE
let html="";
let i=1;
let grand=0;

for(let name in map){

let dr = map[name].dr;
let cr = map[name].cr;
let balance = dr - cr;

grand += balance;

html += `
<tr>
<td>${i++}</td>
<td>Accounts Receivable</td>
<td><b>${name}</b></td>
<td>${dr}</td>
<td>${cr}</td>
<td style="color:${balance<0?'red':'green'}"><b>${balance}</b></td>
</tr>
`;
}

document.getElementById("ledgerTable").innerHTML = html;
document.getElementById("totalBalance").innerText = grand;

}

// AUTO LOAD
window.onload = loadLedger;

</script>

</body>
</html>
