<!DOCTYPE html>
<html>
<head>
<title>Tenant Ledger Table</title>

<style>
body{
  font-family:Arial;
  background:#eef3ff;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.backBtn{background:#34495e;color:white;}
.editBtn{background:orange;color:white;}
.deleteBtn{background:red;color:white;}

input{
  padding:6px;
}

.table-container{
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  min-width:1400px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}

.prev{
  background:#fff3cd;
}
</style>
</head>

<body>

<button class="backBtn" onclick="history.back()">⬅ Back</button>

<div class="box">
<h3>📊 Tenant Ledger (Yearly)</h3>

From: <input type="date" id="from">
To: <input type="date" id="to">

<button onclick="loadTable()">Load</button>

</div>

<div class="box table-container">

<table>
<thead>
<tr>
<th>Name</th>
<th>Previous</th>
<th>JAN</th><th>FEB</th><th>MAR</th><th>APR</th>
<th>MAY</th><th>JUN</th><th>JUL</th><th>AUG</th>
<th>SEP</th><th>OCT</th><th>NOV</th><th>DEC</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

let tenants = JSON.parse(localStorage.getItem("tenants")) || [];
let jv = JSON.parse(localStorage.getItem("jv")) || [];

// GET MONTH
function getMonth(d){
return new Date(d).getMonth();
}

function loadTable(){

let from = new Date(document.getElementById("from").value || "2000-01-01");
let to   = new Date(document.getElementById("to").value || "2100-12-31");

let html = "";

tenants.forEach((t,i)=>{

let months = new Array(12).fill(0);

// 🔥 COMPUTE FROM JOURNAL
jv.forEach(e=>{

// only AR
if(e.code !== "1100") return;

// match client (FIXED)
if((e.sub||"").trim().toLowerCase() !== t.name.trim().toLowerCase()) return;

let d = new Date(e.date);
if(d < from || d > to) return;

let m = getMonth(e.date);

// 🔥 FIX AMOUNT FIELD
let amt = Number(e.amt || 0);

if(e.dc === "D"){
months[m] += amt;
}else{
months[m] -= amt;
}

});

// PREVIOUS BALANCE
let prev = Number(localStorage.getItem("prev_"+t.name)) || 0;

// 🔥 TOTAL COMPUTE (FIXED)
let monthlyTotal = months.reduce((a,b)=>a+b,0);
let total = prev + monthlyTotal;

html += `<tr>

<td>${t.name}</td>

<td class="prev">
<input value="${prev}" 
onchange="savePrev('${t.name}', this.value)">
</td>

${months.map(v=>`<td>${v}</td>`).join("")}

<td><b>${total}</b></td>

<td>
<button class="editBtn" onclick="editTenant(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteTenant(${i})">Delete</button>
</td>

</tr>`;
});

document.getElementById("tbl").innerHTML = html;
}

// SAVE PREVIOUS
function savePrev(name,val){
localStorage.setItem("prev_"+name, val);
}

// EDIT
function editTenant(i){
let newName = prompt("Edit name:", tenants[i].name);
if(newName){
tenants[i].name = newName;
localStorage.setItem("tenants", JSON.stringify(tenants));
loadTable();
}
}

// DELETE
function deleteTenant(i){
if(confirm("Delete tenant?")){
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadTable();
}
}

</script>

</body>
</html>
