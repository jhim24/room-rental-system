<script>

// STORAGE
function getTenants(){
return JSON.parse(localStorage.getItem("tenants")) || [];
}

function getJV(){
return JSON.parse(localStorage.getItem("jv")) || [];
}

// DATE SAFE
function parseDate(d){
let date = new Date(d);
if(isNaN(date)){
let p = d.split("-");
if(p.length===3){
date = new Date(p[0], p[1]-1, p[2]);
}
}
return date;
}

// MONTH FORMAT
function formatMonth(d){
return d.toLocaleString('default',{month:'short'}) + " " + d.getFullYear();
}

// MONTH RANGE
function getMonthRange(from,to){
let months=[];
let d = new Date(from.getFullYear(), from.getMonth(), 1);

while(d <= to){
months.push(new Date(d));
d.setMonth(d.getMonth()+1);
}
return months;
}

// LOAD TABLE
function loadTable(){

let tenants = getTenants();
let jv = getJV();

let from = parseDate(document.getElementById("from").value || "2000-01-01");
let to   = parseDate(document.getElementById("to").value || "2100-12-31");

let monthRange = getMonthRange(from,to);

// HEADER
let header = `
<th>Name</th>
<th>Prev</th>
${monthRange.map(m=>`<th>${formatMonth(m)}</th>`).join("")}
<th>Total</th>
<th>Action</th>
`;
headerRow.innerHTML = header;

let html="";
let grandTotal=0;

// LOOP TENANTS
tenants.forEach((t,i)=>{

let months = new Array(monthRange.length).fill(0);

// 🔥 LOOP JOURNAL
jv.forEach(e=>{

let accName = (e.acc || "").toLowerCase();

// FIX: detect receivable (both rent & payment)
if(!accName.includes("receivable")) return;

// FIX: match client
if((e.sub||"").trim().toLowerCase() !== t.name.trim().toLowerCase()) return;

let d = parseDate(e.date);
if(isNaN(d)) return;

if(d < from || d > to) return;

let idx = monthRange.findIndex(m =>
m.getFullYear() === d.getFullYear() &&
m.getMonth() === d.getMonth()
);

if(idx === -1) return;

let amt = Number(e.amt || 0);
if(isNaN(amt)) amt = 0;

// 🔥 CRITICAL FIX (payment bawas na)
if(e.dc === "D"){
months[idx] += amt;
}else if(e.dc === "C"){
months[idx] -= amt;
}

});

// PREVIOUS
let prev = Number(localStorage.getItem("prev_"+t.name)) || 0;

// TOTAL
let total = prev + months.reduce((a,b)=>a+b,0);
grandTotal += total;

// ROW
html += `
<tr>
<td>${t.name}</td>

<td class="prev">
<input value="${prev}" onchange="savePrev('${t.name}', this.value)">
</td>

${months.map(v=>`<td>${v}</td>`).join("")}

<td><b>${total}</b></td>

<td>
<button onclick="editTenant(${i})">Edit</button>
<button onclick="deleteTenant(${i})">Delete</button>
</td>
</tr>
`;

});

tbl.innerHTML = html;
grandTotalEl.innerText = grandTotal;
document.getElementById("grandTotal").innerText = grandTotal;
}

// SAVE PREV
function savePrev(name,val){
localStorage.setItem("prev_"+name,val);
}

// EDIT
function editTenant(i){
let tenants = getTenants();
let newName = prompt("Edit name:", tenants[i].name);

if(newName){
tenants[i].name = newName;
localStorage.setItem("tenants", JSON.stringify(tenants));
loadTable();
}
}

// DELETE
function deleteTenant(i){
let tenants = getTenants();

if(confirm("Delete tenant?")){
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadTable();
}
}

// AUTO LOAD
window.onload = loadTable;

</script>
