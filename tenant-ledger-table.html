<!DOCTYPE html>
<html>
<head>
<title>Tenant Ledger</title>
</head>
<body>

<h2>Tenant Ledger</h2>

<table border="1" width="100%">
<tr>
<th>Date</th>
<th>Name</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
</tr>

<tbody id="tbl"></tbody>

</table>

<script>

function load(){

let data = JSON.parse(localStorage.getItem("tenantLedger")) || [];

let html="";

data.forEach(d=>{
html+=`
<tr>
<td>${d.date}</td>
<td>${d.name}</td>
<td>${d.desc}</td>
<td>${d.debit}</td>
<td>${d.credit}</td>
</tr>
`;
});

document.getElementById("tbl").innerHTML = html;
}

load();

</script>

</body>
</html>
