<!DOCTYPE html>
<html>
<head>
<title>Tenant Ledger Table</title>

<style>
body{
  font-family:Arial;
  background:#eef3ff;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.backBtn{background:#34495e;color:white;}
.editBtn{background:orange;color:white;}
.deleteBtn{background:red;color:white;}

input{
  padding:6px;
}

.table-container{
  overflow-x:auto;
}

table{
  border-collapse:collapse;
  min-width:1400px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#3498db;
  color:white;
}

.prev{
  background:#fff3cd;
}
</style>
</head>

<body>

<button class="backBtn" onclick="history.back()">⬅ Back</button>

<div class="box">
<h3>📊 Tenant Ledger (Yearly)</h3>

From: <input type="date" id="from">
To: <input type="date" id="to">

<button onclick="loadTable()">Load</button>

</div>

<div class="box table-container">

<table>
<thead>
<tr>
<th>Name</th>
<th>Previous</th>
<th>JAN</th><th>FEB</th><th>MAR</th><th>APR</th>
<th>MAY</th><th>JUN</th><th>JUL</th><th>AUG</th>
<th>SEP</th><th>OCT</th><th>NOV</th><th>DEC</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbl"></tbody>

</table>

</div>

<script>

// ALWAYS GET FRESH DATA
function getTenants(){
return JSON.parse(localStorage.getItem("tenants")) || [];
}

function getJV(){
return JSON.parse(localStorage.getItem("jv")) || [];
}

// SAFE DATE PARSE
function parseDate(d){
let date = new Date(d);
if(isNaN(date)){
// fallback format YYYY-MM-DD manual split
let parts = d.split("-");
if(parts.length===3){
date = new Date(parts[0], parts[1]-1, parts[2]);
}
}
return date;
}

// LOAD TABLE
function loadTable(){

let tenants = getTenants();
let jv = getJV();

let from = parseDate(document.getElementById("from").value || "2000-01-01");
let to   = parseDate(document.getElementById("to").value || "2100-12-31");

let html = "";

tenants.forEach((t,i)=>{

let months = new Array(12).fill(0);

// 🔥 LOOP JOURNAL
jv.forEach(e=>{

// ONLY AR (AUTO DETECT)
if(!e.acc.toLowerCase().includes("receivable")) return;

// CLIENT MATCH (FIXED)
if((e.sub||"").trim().toLowerCase() !== t.name.trim().toLowerCase()) return;

// DATE
let d = parseDate(e.date);
if(isNaN(d)) return;

if(d < from || d > to) return;

// MONTH
let m = d.getMonth();

// AMOUNT
let amt = Number(e.amt || 0);

// COMPUTE
if(e.dc === "D"){
months[m] += amt;
}else{
months[m] -= amt;
}

});

// PREVIOUS
let prev = Number(localStorage.getItem("prev_"+t.name)) || 0;

// TOTAL
let total = prev + months.reduce((a,b)=>a+b,0);

html += `<tr>

<td>${t.name}</td>

<td class="prev">
<input value="${prev}" onchange="savePrev('${t.name}', this.value)">
</td>

${months.map(v=>`<td>${v}</td>`).join("")}

<td><b>${total}</b></td>

<td>
<button class="editBtn" onclick="editTenant(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteTenant(${i})">Delete</button>
</td>

</tr>`;
});

document.getElementById("tbl").innerHTML = html;
}

// SAVE PREVIOUS
function savePrev(name,val){
localStorage.setItem("prev_"+name, val);
}

// EDIT
function editTenant(i){
let tenants = getTenants();
let newName = prompt("Edit name:", tenants[i].name);
if(newName){
tenants[i].name = newName;
localStorage.setItem("tenants", JSON.stringify(tenants));
loadTable();
}
}

// DELETE
function deleteTenant(i){
let tenants = getTenants();
if(confirm("Delete tenant?")){
tenants.splice(i,1);
localStorage.setItem("tenants", JSON.stringify(tenants));
loadTable();
}
}

// AUTO LOAD
window.onload = loadTable;

</script>

</body>
</html>
